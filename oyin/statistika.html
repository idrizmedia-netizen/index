<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mening Statistikam — Ziyomap Games</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f8fc;--white:#fff;--text:#1a1d2e;--muted:#6b7280;--border:#e5e7eb;--blue:#4f7cff;--green:#22c55e;--purple:#a855f7;--pink:#ec4899;--orange:#f97316}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;text-decoration:none;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:#fff}
.main-container{max-width:600px;width:100%;margin:32px auto;padding:0 20px}
.header-title{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:24px;text-align:center}
.stat-main-card{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:28px;box-shadow:0 4px 6px rgba(0,0,0,0.02);margin-bottom:20px;text-align:center}
.total-label{font-size:15px;color:var(--muted);margin-bottom:4px}
.total-val{font-family:'Outfit',sans-serif;font-size:3rem;font-weight:800;color:var(--blue);margin-bottom:16px}
.progress-grid{display:flex;flex-direction:column;gap:16px;background:var(--white);border:1px solid var(--border);border-radius:24px;padding:24px}
.progress-item{display:flex;flex-direction:column;gap:6px}
.progress-info{display:flex;justify-content:space-between;font-size:14px;font-weight:700}
.bar-bg{height:10px;background:#f1f5f9;border-radius:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:10px;width:0%;transition:width 0.8s ease-out}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="index.html">⬅ Orqaga</a>
  <h2 style="font-family:'Outfit',sans-serif;font-size:1.2rem">📊 Statistika</h2>
</div>

<div class="main-container">
  <h1 class="header-title">Mening Yutuqlarim 📊</h1>
  
  <div class="stat-main-card">
    <div class="total-label">Umumiy Jamg'arilgan Ball</div>
    <div class="total-val" id="totalPoints">0</div>
    <p style="color:var(--muted);font-size:14px" id="levelText">Sizning unvoningiz: Bilimdon</p>
  </div>

  <div class="progress-grid">
    <h3 style="font-family:'Outfit',sans-serif;font-size:1.1rem;margin-bottom:8px">🎮 O'yinlar kesimida progress:</h3>
    
    <div class="progress-item">
      <div class="progress-info"><span>❓ Quiz Musobaqa</span><span id="p1">0%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="b1" style="background:var(--blue)"></div></div>
    </div>
    
    <div class="progress-item">
      <div class="progress-info"><span>🃏 Flashcard Tizimi</span><span id="p2">0%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="b2" style="background:var(--green)"></div></div>
    </div>

    <div class="progress-item">
      <div class="progress-info"><span>⚡ Tezkor Javob</span><span id="p3">0%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="b3" style="background:var(--orange)"></div></div>
    </div>

    <div class="progress-item">
      <div class="progress-info"><span>🧩 So'z Topish</span><span id="p4">0%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="b4" style="background:var(--purple)"></div></div>
    </div>

    <div class="progress-item">
      <div class="progress-info"><span>🧠 Xotira O'yini</span><span id="p5">0%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="b5" style="background:var(--pink)"></div></div>
    </div>
  </div>
</div>

<script>
function loadStats() {
  const total = parseInt(localStorage.getItem("ziyomap_total") || "0");
  document.getElementById("totalPoints").textContent = total;
  
  // Unvon aniqlash
  let lvl = "Boshlovchi 🌟";
  if(total >= 800) lvl = "Daho olim 👑";
  else if(total >= 500) lvl = "Akademik 🎓";
  else if(total >= 200) lvl = "Bilimdon 💪";
  document.getElementById("levelText").textContent = "Sizning unvoningiz: " + lvl;

  // Har bir o'yin ulushini hisoblash (maksimal 200 ballga nisbatan)
  let q1 = Math.min(Math.round((total / 400) * 100), 100);
  let q2 = total > 0 ? 100 : 0; // Flashcard o'rganilgan bo'lsa
  let q3 = Math.min(Math.round((total / 300) * 100), 100);
  let q4 = Math.min(Math.round((total / 250) * 100), 100);
  let q5 = Math.min(Math.round((total / 200) * 100), 100);

  setTimeout(() => {
    document.getElementById("b1").style.width = q1 + "%"; document.getElementById("p1").textContent = q1 + "%";
    document.getElementById("b2").style.width = q2 + "%"; document.getElementById("p2").textContent = q2 + "%";
    document.getElementById("b3").style.width = q3 + "%"; document.getElementById("p3").textContent = q3 + "%";
    document.getElementById("b4").style.width = q4 + "%"; document.getElementById("p4").textContent = q4 + "%";
    document.getElementById("b5").style.width = q5 + "%"; document.getElementById("p5").textContent = q5 + "%";
  }, 100);
}
loadStats();
</script>
</body>
</html>
