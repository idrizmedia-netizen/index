<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flashcard — Ziyomap Games</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<script src="questions.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f8fc;--white:#fff;--text:#1a1d2e;--muted:#6b7280;--border:#e5e7eb;--green:#22c55e;--blue:#4f7cff;--red:#ef4444}

/* 🌙 TUNGI REJIM RANGALARI (Mavjud dizaynga zarar yetkazmaydi) */
[data-theme="dark"] {
  --bg: #0f111a;
  --white: #161925;
  --text: #f3f4f6;
  --muted: #9ca3af;
  --border: #26293b;
}

body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition: background 0.3s, color 0.3s;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;transition: background 0.3s, border-color 0.3s;}
.back{font-size:14px;font-weight:700;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:8px;border:1px solid var(--border);transition: all 0.2s;}
.back:hover{background:var(--bg)}
.tt{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:800}
.right{margin-left:auto;display:flex;gap:10px}
.pill{background:var(--bg);border:1px solid var(--border);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;transition: background 0.3s, border-color 0.3s;}
.wrap{max-width:640px;margin:0 auto;padding:24px 16px}
.lbl{font-size:14px;font-weight:700;margin-bottom:10px}
.fan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.fan-card{border:2px solid var(--border);border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center;background:var(--white);transition:all .15s}
.fan-card:hover{border-color:var(--green)}
.fan-card.sel{border-color:var(--green);background:#f0fdf4}
/* Tungi rejimda tanlangan fan kartasi to'qroq ko'rinishi uchun */
[data-theme="dark"] .fan-card.sel { background: #14532d; border-color: var(--green); }

.fi{font-size:1.8rem;margin-bottom:6px}
.fn{font-size:13px;font-weight:700}
.fc{font-size:11px;color:var(--muted);margin-top:2px}
.start-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--green);color:#fff;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:800;cursor:pointer}
.start-btn:hover{background:#16a34a}

#cardScreen{display:none}
.card-top{text-align:center;margin-bottom:12px}
.fan-tag{display:inline-block;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:4px}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.pb{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:20px;transition: background 0.3s;}
.pbf{height:100%;background:var(--green);border-radius:4px;transition:width .4s}

.card-scene{perspective:1000px;margin:0 auto 20px;max-width:520px;height:260px}
.flip-card{width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative}
.flip-card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;border:2px solid var(--border);transition: background 0.3s, border-color 0.3s;}
.front{background:var(--white)}
.back{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);transform:rotateY(180deg);border-color:var(--green)}
/* Tungi rejimda javob orqa foni o'ta yorug' bo'lmasligi uchun */
[data-theme="dark"] .back { background: linear-gradient(135deg, #14532d, #064e3b); border-color: var(--green); }

.face-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.45;margin-bottom:10px}
.face-txt{font-size:1.25rem;font-weight:700;line-height:1.5}
.face-hint{font-size:13px;color:var(--muted);margin-top:12px}

.actions{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.act{flex:1;max-width:140px;padding:12px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s}
.act-again{background:#fef2f2;color:var(--red)}
.act-again:hover{background:var(--red);color:#fff}
[data-theme="dark"] .act-again { background: #451a1a; color: #fca5a5; }
[data-theme="dark"] .act-again:hover { background: var(--red); color: #fff; }

.act-skip{background:var(--bg);color:var(--muted)}
.act-skip:hover{background:var(--border)}

.act-know{background:#f0fdf4;color:var(--green)}
.act-know:hover{background:var(--green);color:#fff}
[data-theme="dark"] .act-know { background: #14532d; color: #86efac; }
[data-theme="dark"] .act-know:hover { background: var(--green); color: #fff; }

#doneScreen{display:none;text-align:center}
.done-card{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:36px 28px;margin-bottom:20px;transition: background 0.3s, border-color 0.3s;}
.de{font-size:4rem;margin-bottom:12px}
.dt{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:8px}
.ds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0 24px}
.ds{background:var(--bg);border-radius:12px;padding:16px;transition: background 0.3s;}
.dv{font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800}
.dk{font-size:12px;color:var(--muted);margin-top:3px}
.btn-row{display:flex;gap:10px}
.bo{flex:1;padding:12px;border-radius:12px;border:2px solid var(--border);background:var(--white);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;color:var(--text);transition: background 0.2s, border-color 0.2s;}
.bo:hover{background:var(--bg)}
.bp{flex:1;padding:12px;border-radius:12px;border:none;background:var(--green);color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition: opacity 0.2s;}
.bp:hover{opacity: 0.9;}
</style>
</head>
<body>
<div class="topbar">
  <a class="back" href="index.html">← Orqaga</a>
  <div class="tt">🃏 Flashcard</div>
  <div class="right">
    <div class="pill">✅ <span id="knowC">0</span></div>
    <div class="pill">❌ <span id="againC">0</span></div>
  </div>
</div>
<div class="wrap">
  <div id="setupScreen">
    <h2 style="font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:6px">🃏 Flashcard</h2>
    <p style="color:var(--muted);margin-bottom:24px">Kartalarni aylantiring va bilimingizni sinang</p>
    <div class="lbl">Fan tanlang:</div>
    <div class="fan-grid" id="fanGrid"></div>
    <button class="start-btn" onclick="startCards()">▶ Boshlash</button>
  </div>

  <div id="cardScreen">
    <div class="card-top">
      <span class="fan-tag" id="fanTag"></span>
    </div>
    <div class="prog-info">
      <span id="cardNum">1 / 20</span>
      <span style="color:var(--green);font-weight:700" id="pct">0%</span>
    </div>
    <div class="pb"><div class="pbf" id="pbf" style="width:0%"></div></div>
    <div class="card-scene">
      <div class="flip-card" id="flipCard" onclick="flipCard()">
        <div class="face front">
          <div class="face-lbl">❓ Savol</div>
          <div class="face-txt" id="cardQ"></div>
          <div class="face-hint">Bosing — javobni ko'ring</div>
        </div>
        <div class="face back">
          <div class="face-lbl">✅ Javob</div>
          <div class="face-txt" id="cardA"></div>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="act act-again" onclick="mark('again')">❌ Bilmadim</button>
      <button class="act act-skip" onclick="mark('skip')">⏭ O'tkazish</button>
      <button class="act act-know" onclick="mark('know')">✅ Bildim!</button>
    </div>
  </div>

  <div id="doneScreen">
    <div class="done-card">
      <div class="de" id="doneEmoji">🎉</div>
      <div class="dt">Tugatdingiz!</div>
      <p style="color:var(--muted)" id="doneSub"></p>
      <div class="ds-grid">
        <div class="ds"><div class="dv" id="dv1">0</div><div class="dk">✅ Bilganlar</div></div>
        <div class="ds"><div class="dv" id="dv2">0</div><div class="dk">❌ Bilmaganlar</div></div>
        <div class="ds"><div class="dv" id="dv3">0%</div><div class="dk">📊 Natija</div></div>
      </div>
      <div class="btn-row">
        <button class="bo" onclick="goSetup()">⚙ Sozlash</button>
        <button class="bp" onclick="startCards()">🔄 Qayta</button>
        <button class="bo" onclick="location.href='index.html'">🏠 Bosh</button>
      </div>
    </div>
  </div>
</div>
<script>
// 🔄 TUNGI REJIM ASOSIY SOZLAMASINI YUKLASH (Eski kodlar daxlsiz saqlanadi)
(function() {
  const savedTheme = localStorage.getItem("zy_theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
})();

const FM=[
  {id:"fizika",name:"Fizika",icon:"⚛️",color:"#4f7cff",bg:"#eff3ff"},
  {id:"matematika",name:"Matematika",icon:"📐",color:"#22c55e",bg:"#f0fdf4"},
  {id:"informatika",name:"Informatika",icon:"💻",color:"#14b8a6",bg:"#f0fdfa"},
  {id:"biologiya",name:"Biologiya",icon:"🧬",color:"#ec4899",bg:"#fdf2f8"},
  {id:"kimyo",name:"Kimyo",icon:"🧪",color:"#eab308",bg:"#fefce8"},
  {id:"tarix",name:"Tarix",icon:"📜",color:"#a855f7",bg:"#faf5ff"},
  {id:"ingliz",name:"Ingliz",icon:"🇬🇧",color:"#f97316",bg:"#fff7ed"},
  {id:"geografiya",name:"Geografiya",icon:"🌍",color:"#06b6d4",bg:"#ecfeff"},
];
let S={sel:["fizika"],cards:[],cur:0,know:0,again:0,skip:0,flipped:false};

function buildFans(){
  const g=document.getElementById("fanGrid");g.innerHTML="";
  FM.forEach(f=>{
    const cnt=(FLASHCARD_CARDS[f.id]||[]).length;
    const el=document.createElement("div");
    el.className="fan-card"+(S.sel.includes(f.id)?" sel":"");
    el.innerHTML=`<div class="fi">${f.icon}</div><div class="fn">${f.name}</div><div class="fc">${cnt} karta</div>`;
    el.onclick=()=>{const i=S.sel.indexOf(f.id);if(i>-1){if(S.sel.length===1)return;S.sel.splice(i,1);el.classList.remove("sel");}else{S.sel.push(f.id);el.classList.add("sel");}};
    g.appendChild(el);
  });
}

function startCards(){
  let pool=[];
  S.sel.forEach(f=>(FLASHCARD_CARDS[f]||[]).forEach(c=>pool.push({...c,fan:f})));
  pool=pool.sort(()=>Math.random()-.5);
  if(!pool.length){alert("Karta topilmadi!");return;}
  S.cards=pool;S.cur=0;S.know=0;S.again=0;S.skip=0;
  document.getElementById("setupScreen").style.display="none";
  document.getElementById("doneScreen").style.display="none";
  document.getElementById("cardScreen").style.display="block";
  showCard();
}

function showCard(){
  if(S.cur>=S.cards.length){showDone();return;}
  const c=S.cards[S.cur];S.flipped=false;
  document.getElementById("flipCard").classList.remove("flipped");
  document.getElementById("cardQ").textContent=c.q;
  document.getElementById("cardA").textContent=c.a;
  const tot=S.cards.length;
  document.getElementById("cardNum").textContent=`${S.cur+1} / ${tot}`;
  const prog=Math.round((S.cur/tot)*100);
  document.getElementById("pbf").style.width=prog+"%";
  document.getElementById("pct").textContent=prog+"%";
  
  // Tungi rejimda ranglar muvozanatini saqlash uchun fan teglari rangini boshqarish
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  const f=FM.find(x=>x.id===c.fan)||{name:c.fan,color:"#4f7cff",bg:"#eff3ff"};
  const t=document.getElementById("fanTag");
  t.textContent=f.name;
  if(isDark) {
    t.style.background = "#1e293b";
    t.style.color = "#60a5fa";
  } else {
    t.style.background=f.bg;
    t.style.color=f.color;
  }
  
  document.getElementById("knowC").textContent=S.know;
  document.getElementById("againC").textContent=S.again;
}

function flipCard(){S.flipped=!S.flipped;document.getElementById("flipCard").classList.toggle("flipped",S.flipped);}

function mark(type){
  if(type==="know")S.know++;
  else if(type==="again"){S.again++;S.cards.push(S.cards[S.cur]);}
  else S.skip++;
  S.cur++;showCard();
}

function showDone(){
  document.getElementById("cardScreen").style.display="none";
  document.getElementById("doneScreen").style.display="block";
  const tot=S.know+S.again+S.skip;
  const pct=tot?Math.round((S.know/tot)*100):0;
  document.getElementById("doneEmoji").textContent=pct>=80?"🏆":pct>=50?"🎉":"💪";
  document.getElementById("doneSub").textContent=`${pct}% kartani bilasiz!`;
  document.getElementById("dv1").textContent=S.know;
  document.getElementById("dv2").textContent=S.again;
  document.getElementById("dv3").textContent=pct+"%";
}

function goSetup(){document.getElementById("doneScreen").style.display="none";document.getElementById("setupScreen").style.display="block";}
buildFans();
</script>
</body>
</html>
