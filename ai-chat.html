<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ziyomap AI Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/ai-chat.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/notifications.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="chat-page-wrap">
        <div class="chat-top-bar">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Bosh sahifa</a>
            <h1 class="chat-page-title"><i class="fas fa-brain"></i> Ziyomap AI</h1>
            <a href="ai-tools.html" style="color:var(--primary-color);font-weight:600;font-size:0.9rem;">Ziyo AI Studio</a>
        </div>

        <div id="auth-notice" class="auth-notice">
            Chatdan foydalanish uchun avval <a href="kirish.html">tizimga kiring</a> (Google yoki ism bilan).
        </div>

        <div class="chat-shell">
            <div class="chat-header">
                <span><i class="fas fa-robot"></i> Sun'iy intellekt yordamchisi</span>
            </div>

            <div id="chat-messages">
                <div class="welcome-bubble">
                    Assalomu alaykum! Savol bering, rasm yoki fayl (PDF, matn) yuklashingiz mumkin.
                </div>
            </div>

            <div id="image-preview-box">
                <img id="preview-img" src="" alt="Ko‘rinish">
                <button type="button" class="preview-remove" onclick="cancelImage()" title="O‘chirish">×</button>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-row">
                    <label for="file-upload" class="file-label" title="Fayl biriktirish">
                        <i class="fas fa-paperclip"></i>
                    </label>
                    <input type="file" id="file-upload" accept="image/*,application/pdf,text/plain" hidden>
                    <input type="text" id="user-input-ai" placeholder="Savol yozing...">
                    <button type="button" id="send-btn-ai" title="Yuborish">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/ziyomap-usage.js"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/notifications.js"></script>
    <script>ZiyomapAuthGuard.protectPage();</script>
    <script src="js/ai-chat.js"></script>
<script>
document.addEventListener('keydown', function(e){
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    if (window.ZiyomapSearch) ZiyomapSearch.open();
  }
});
</script>
</body>
</html>
