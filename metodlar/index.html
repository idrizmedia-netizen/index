<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyomap - Interaktiv Metodlar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Portfoliongizga mos fon rangi simulyatsiyasi */
        body {
            background-color: #0b1120;
        }
    </style>
</head>
<body class="text-gray-100 font-sans antialiased min-h-screen">

    <header class="border-b border-gray-800 bg-[#0f172a]/80 backdrop-blur sticky top-0 z-50 py-6">
        <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-teal-400 bg-clip-text text-transparent">
                    ✨ Pedagogik Metodlar va Interaktiv O'yinlar
                </h1>
                <p class="text-gray-400 text-xs md:text-sm mt-1">Darslarni qiziqarli o'tish uchun tayyor metodik xazina</p>
            </div>
            <a href="../index.html" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm font-medium transition border border-gray-700">
                ← Portfolioga qaytish
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
        
        <div class="flex flex-wrap justify-center gap-3 mb-10" id="filter-buttons">
            <button onclick="filterMetodlar('all')" class="px-5 py-2.5 rounded-xl bg-blue-600 text-white font-medium shadow-lg shadow-blue-500/20 transition hover:bg-blue-500 cursor-pointer text-sm">
                📌 Barchasi
            </button>
            <button onclick="filterMetodlar('yangi-mavzu')" class="px-5 py-2.5 rounded-xl bg-[#1e293b] text-gray-300 border border-gray-700 font-medium transition hover:bg-gray-700 hover:text-white cursor-pointer text-sm">
                🚀 Yangi mavzu uchun
            </button>
            <button onclick="filterMetodlar('mustahkamlash')" class="px-5 py-2.5 rounded-xl bg-[#1e293b] text-gray-300 border border-gray-700 font-medium transition hover:bg-gray-700 hover:text-white cursor-pointer text-sm">
                🧠 Mavzuni mustahkamlash
            </button>
            <button onclick="filterMetodlar('refleksiya')" class="px-5 py-2.5 rounded-xl bg-[#1e293b] text-gray-300 border border-gray-700 font-medium transition hover:bg-gray-700 hover:text-white cursor-pointer text-sm">
                🎯 Dars oxirida (Refleksiya)
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="metodlar-grid">
            </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
