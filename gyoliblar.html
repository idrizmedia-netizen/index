<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>G'oliblar | Ziyomap</title>
<link rel="icon" type="image/png" href="icon-192x192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="css/notifications.css">
<style>
:root {
    --primary: #2563eb; --card: #ffffff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
    --page-bg: linear-gradient(145deg, #dbeafe 0%, #eff6ff 50%, #f0fdf4 100%);
}
body.dark-theme {
    --card: #151f32; --text: #f1f5f9; --muted: #94a3b8; --border: #293449;
    --page-bg: linear-gradient(145deg, #0b1220 0%, #0f1a2e 50%, #0b1a14 100%);
}
* { box-sizing: border-box; }
body {
    font-family: Inter, system-ui, sans-serif; margin: 0; min-height: 100dvh;
    background: var(--page-bg); color: var(--text); padding: 16px 16px 40px;
    transition: background .25s, color .25s;
}
.wrap { max-width: 640px; margin: 0 auto; }
.top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.brand { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); font-weight: 900; font-size: 1.05rem; }
.brand img { height: 30px; width: 30px; object-fit: contain; }
.brand span.b { color: #00bcd4; }
.icon-btn {
    width: 34px; height: 34px; border-radius: 10px; border: none; background: var(--card); color: var(--primary);
    box-shadow: 0 2px 8px rgba(37,99,235,0.12); display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 0.9rem; text-decoration: none;
}
.page-head { text-align: center; margin-bottom: 22px; }
.page-head .ic {
    width: 60px; height: 60px; border-radius: 18px; background: linear-gradient(135deg,#f59e0b,#ea580c);
    color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 1.7rem; margin-bottom: 10px;
    box-shadow: 0 10px 24px rgba(234,88,12,0.3);
}
.page-head h1 { margin: 0 0 6px; font-size: 1.4rem; }
.page-head p { margin: 0; color: var(--muted); font-size: 0.88rem; }

#contest-select-wrap { margin-bottom: 18px; }
#contest-select-wrap select {
    width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
    font-size: 14px; font-family: inherit; background: var(--card); color: var(--text);
}

.podium { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 22px; }
.podium .p-item { flex: 1; text-align: center; background: var(--card); border-radius: 16px; padding: 14px 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
.podium .p-item.first { padding-top: 22px; order: 2; box-shadow: 0 14px 34px rgba(245,158,11,0.25); border: 1.5px solid #f59e0b; }
.podium .p-item.second { order: 1; }
.podium .p-item.third { order: 3; }
.podium .medal { font-size: 1.8rem; margin-bottom: 6px; }
.podium .p-name { font-weight: 800; font-size: 0.85rem; }
.podium .p-score { color: var(--primary); font-weight: 900; font-size: 1.1rem; margin-top: 4px; }
.podium .p-school { color: var(--muted); font-size: 0.72rem; margin-top: 2px; }

.rest-list { background: var(--card); border-radius: 18px; padding: 8px; }
.rest-row { display: flex; align-items: center; gap: 12px; padding: 12px 10px; border-bottom: 1px solid var(--border); }
.rest-row:last-child { border-bottom: none; }
.rest-row .rk { width: 28px; text-align: center; font-weight: 800; color: var(--muted); }
.rest-row .nm { flex: 1; }
.rest-row .nm .n1 { font-weight: 700; font-size: 0.9rem; }
.rest-row .nm .n2 { color: var(--muted); font-size: 0.75rem; }
.rest-row .sc { font-weight: 800; color: var(--primary); }

.empty-box { text-align: center; color: var(--muted); padding: 50px 10px; }
.empty-box i { font-size: 2.2rem; margin-bottom: 10px; display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <a href="index.html" class="brand">
      <img src="images/nav-icon.png" alt="Ziyomap">
      <span><span class="b">Ziyo</span>map</span>
    </a>
    <div style="display:flex;gap:8px">
      <button class="icon-btn" id="theme-toggle-gyol" title="Tun/Kun rejimi"><i class="fas fa-moon"></i></button>
      <a href="index.html" class="icon-btn" title="Bosh sahifa"><i class="fas fa-house"></i></a>
    </div>
  </div>

  <div class="page-head">
    <div class="ic"><i class="fas fa-trophy"></i></div>
    <h1>G'oliblar reytingi</h1>
    <p>Tanlovlarda eng yuqori ball to'plagan ishtirokchilar</p>
  </div>

  <div id="contest-select-wrap" style="display:none">
    <select id="lb-select"></select>
  </div>

  <div id="lb-content">
    <div class="empty-box"><i class="fas fa-spinner fa-spin"></i>Yuklanmoqda...</div>
  </div>
</div>

<script type="module" src="js/gyoliblar.js"></script>
<script>
(function () {
    function applyTheme(isDark) {
        document.body.classList.toggle('dark-theme', isDark);
        const icon = document.getElementById('theme-toggle-gyol')?.querySelector('i');
        if (icon) { icon.classList.toggle('fa-sun', isDark); icon.classList.toggle('fa-moon', !isDark); }
    }
    applyTheme(localStorage.getItem('theme') === 'dark');
    document.getElementById('theme-toggle-gyol')?.addEventListener('click', () => {
        const isDark = !document.body.classList.contains('dark-theme');
        applyTheme(isDark);
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
})();
</script>
</body>
</html>
