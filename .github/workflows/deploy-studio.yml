name: Deploy Sanity Studio

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v4 ga yangilandi

      - name: Setup Node.js
        uses: actions/setup-node@v4 # v4 ga yangilandi
        with:
          node-version: 22 # Barqaror yangi versiya

      - name: Install dependencies
        run: |
          cd studio && npm install --legacy-peer-deps
          cd studio && npm install sanity @sanity/cli

      - name: Deploy Sanity Studio
        run: cd studio && npx sanity deploy --yes
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
