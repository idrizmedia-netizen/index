<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyomap AI Asboblari | Dars Ishlanmasi & PDF</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/clauderic/html-docx-js@master/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #3b82f6;
            --dark-color: #1e293b;
            --light-bg: #f0f9ff;
            --text-color: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
        }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        h2 { color: var(--primary-color); display: flex; align-items: center; gap: 10px; }

        .input-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            background: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .btn-ai {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .btn-ai:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }

        #result-area, #formula-result {
            margin-top: 25px;
            padding: 40px; 
            background: #fff;
            border-radius: 15px;
            border-left: 5px solid var(--primary-color);
            display: none;
            line-height: 1.8;
            white-space: normal; 
            color: #000;
            font-size: 14pt;
        }

        mjx-container {
            display: inline-block !important;
            margin: 5px 0 !important;
            max-width: 100%;
            overflow-x: visible !important;
            overflow-y: visible !important;
        }

        #result-area h1, #result-area h2, #result-area h3 { color: var(--primary-color); margin-top: 20px; }
        #result-area ul { padding-left: 20px; }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            display: none;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--dark-color);
            border: 1px solid #cbd5e1;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table, th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8fafc; }

        .pdf-offscreen-container {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 190mm;
            background: white !important;
            color: black !important;
            padding: 0;
            margin: 0;
            font-family: 'Inter', serif;
            overflow: visible !important;
        }
        
        .pdf-offscreen-container * {
            max-height: 1000000px !important;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="text-decoration: none; color: var(--primary-color); font-weight: bold;">
        <i class="fas fa-arrow-left"></i> Orqaga qaytish
    </a>

    <div class="tool-card" data-aos="fade-up">
        <div id="auth-guard-1" class="auth-overlay">
            <i class="fas fa-lock fa-3x" style="color: var(--primary-color); margin-bottom: 15px;"></i>
            <h3>Kirish cheklangan</h3>
            <p>Ushbu vositadan foydalanish uchun asosiy sahifada Google orqali tizimga kiring.</p>
            <button class="btn-ai" onclick="window.location.href='index.html'">
                <i class="fab fa-google"></i> Tizimga kirish
            </button>
        </div>

        <h2><i class="fas fa-file-invoice"></i> Universal AI Dars Ishlanmasi</h2>
        
        <div class="input-group">
            <label>Fanni tanlang:</label>
            <select id="lesson-subject">
                <optgroup label="Aniq fanlar">
                    <option value="Matematika">Matematika</option>
                    <option value="Algebra">Algebra</option>
                    <option value="Geometriya">Geometriya</option>
                    <option value="Informatika">Informatika</option>
                </optgroup>
                <optgroup label="Tabiiy fanlar">
                    <option value="Fizika" selected>Fizika</option>
                    <option value="Kimyo">Kimyo</option>
                    <option value="Biologiya">Biologiya</option>
                    <option value="Geografiya">Geografiya</option>
                </optgroup>
                <option value="Tarix">Tarix</option>
                <option value="Ona tili">Ona tili</option>
                <option value="Ingliz tili">Ingliz tili</option>
            </select>
        </div>

        <div class="input-group">
            <label>Mavzu nomi:</label>
            <input type="text" id="lesson-topic" placeholder="Masalan: Nyuton qonunlari yoki Optika...">
        </div>

        <div class="input-group">
            <label>Sinf:</label>
            <select id="lesson-grade">
                <option value="1-4">Boshlang'ich (1-4 sinf)</option>
                <option value="5">5-sinf</option>
                <option value="6">6-sinf</option>
                <option value="7">7-sinf</option>
                <option value="8">8-sinf</option>
                <option value="9" selected>9-sinf</option>
                <option value="10">10-sinf</option>
                <option value="11">11-sinf</option>
            </select>
        </div>

        <button class="btn-ai" id="gen-btn-1" onclick="generateLesson()">
            <i class="fas fa-magic"></i> Reja yaratish
        </button>

        <div id="result-area"></div>

        <div class="action-buttons" id="action-btns">
            <button class="btn-secondary" onclick="exportToPDF('result-area', 'Dars_Ishlanmasi')">
                <i class="fas fa-file-pdf" style="color: #e11d48;"></i> PDF yuklash
            </button>
            <button class="btn-secondary" onclick="exportToWord('result-area', 'Dars_Ishlanmasi')">
                <i class="fas fa-file-word" style="color: #2563eb;"></i> Word (.doc) yuklash
            </button>
        </div>
    </div>

    <div class="tool-card" data-aos="fade-up" data-aos-delay="200">
        <div id="auth-guard-2" class="auth-overlay">
            <i class="fas fa-lock fa-3x" style="color: var(--primary-color); margin-bottom: 15px;"></i>
            <h3>Kirish cheklangan</h3>
        </div>

        <h2><i class="fas fa-bolt"></i> Aqlli "Shpargalka" & Konspekt</h2>
        <div class="input-group">
            <label>Mavzu yoki bo'limni kiriting:</label>
            <input type="text" id="formula-query" placeholder="Formulalar va qisqa ma'lumotlar uchun...">
        </div>

        <button class="btn-ai" id="gen-btn-2" onclick="generateCheatSheet()">
            <i class="fas fa-search"></i> Ma'lumotlarni topish
        </button>

        <div id="formula-result"></div>

        <div class="action-buttons" id="formula-action-btns">
            <button class="btn-secondary" onclick="exportToPDF('formula-result', 'Konspekt')">
                <i class="fas fa-file-pdf" style="color: #e11d48;"></i> PDF yuklash
            </button>
            <button class="btn-secondary" onclick="exportToWord('formula-result', 'Konspekt')">
                <i class="fas fa-file-word" style="color: #2563eb;"></i> Word (.doc) yuklash
            </button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();

    function checkGoogleAuth() {
        const user = localStorage.getItem('user'); 
        const guard1 = document.getElementById('auth-guard-1');
        const guard2 = document.getElementById('auth-guard-2');
        if (user) {
            if(guard1) guard1.style.display = 'none';
            if(guard2) guard2.style.display = 'none';
        } else {
            if(guard1) guard1.style.display = 'flex';
            if(guard2) guard2.style.display = 'flex';
        }
    }
    window.onload = checkGoogleAuth;

    function cleanMarkdown(text) {
        if (!text) return "";
        let cleaned = text
            .replace(/\\_/g, '_')
            .replace(/\\\*/g, '*')
            .replace(/\\\{/g, '{')
            .replace(/\\\}/g, '}')
            .replace(/\\#/g, '#')
            .replace(/\\\$/g, '$');
        return cleaned;
    }

    async function generateLesson() {
        const subject = document.getElementById('lesson-subject').value;
        const topic = document.getElementById('lesson-topic').value;
        const grade = document.getElementById('lesson-grade').value;
        const resultArea = document.getElementById('result-area');
        const actionBtns = document.getElementById('action-btns');
        const btn = document.getElementById('gen-btn-1');

        if (!topic) return alert("Mavzuni yozing!");

        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Tezkor yaratilmoqda...';
        resultArea.style.display = "block";
        resultArea.innerHTML = "<i>Ziyomap AI dars rejasini mukammal formatda tuzmoqda...</i>";

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: `${subject} fanidan ${grade}-sinf uchun "${topic}" mavzusida professional dars ishlanmasi tuz. Jadvallar, metodlar va formulalarni LaTeX ($...$) ko'rinishida ishlating. Hech qanday tushuntirishsiz faqat dars rejasini yoz.` 
                })
            });

            const data = await response.json();
            marked.setOptions({ breaks: true, gfm: true });
            const cleanedText = cleanMarkdown(data.reply);
            resultArea.innerHTML = marked.parse(cleanedText);
            
            if (window.MathJax) {
                await MathJax.typesetPromise([resultArea]);
            }
            actionBtns.style.display = "flex";
        } catch (error) {
            resultArea.innerText = "Xatolik! Internet bilan ulanishni tekshiring.";
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-magic"></i> Reja yaratish';
        }
    }

    async function generateCheatSheet() {
        const query = document.getElementById('formula-query').value;
        const resultArea = document.getElementById('formula-result');
        const actionBtns = document.getElementById('formula-action-btns');
        const btn = document.getElementById('gen-btn-2');

        if (!query) return alert("Mavzuni yozing!");

        btn.disabled = true;
        resultArea.style.display = "block";
        resultArea.innerHTML = "<i>Ma'lumotlar yig'ilmoqda...</i>";

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: `"${query}" mavzusi bo'yicha eng muhim formulalar va qoidalar. Formulalar LaTeX $...$ formatida bo'lsin.` 
                })
            });

            const data = await response.json();
            resultArea.innerHTML = marked.parse(cleanMarkdown(data.reply));
            
            if (window.MathJax) {
                await MathJax.typesetPromise([resultArea]);
            }
            actionBtns.style.display = "flex";
        } catch (error) {
            resultArea.innerText = "Xatolik yuz berdi.";
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-search"></i> Ma\'lumotlarni topish';
        }
    }

    // --- PDF EKSPORT ---
    async function exportToPDF(elementId, fileName) {
        const originalElement = document.getElementById(elementId);
        if (!originalElement || originalElement.innerHTML.trim() === "") return alert("Avval ma'lumot yarating!");

        const container = document.createElement('div');
        container.className = 'pdf-offscreen-container';
        const clone = originalElement.cloneNode(true);
        clone.style.display = 'block';
        clone.style.margin = '0';
        clone.style.padding = '0';
        container.appendChild(clone);
        document.body.appendChild(container);

        if (window.MathJax) await MathJax.typesetPromise([container]);

        const opt = {
            margin: [10, 10, 10, 10],
            filename: `${fileName}_${Date.now()}.pdf`,
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 2.5, useCORS: true, backgroundColor: '#ffffff' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true },
            pagebreak: { mode: ['css', 'legacy'], avoid: ['img', 'table', 'mjx-container'] }
        };

        try {
            await new Promise(resolve => setTimeout(resolve, 1000));
            await html2pdf().set(opt).from(container).save();
        } finally {
            if (document.body.contains(container)) document.body.removeChild(container);
        }
    }

    // --- WORD EKSPORT (FORMULALARNI RASMGA O'GIRIB YUKLASH) ---
    async function exportToWord(elementId, fileName) {
        const originalElement = document.getElementById(elementId);
        if (!originalElement || originalElement.innerHTML.trim() === "") return alert("Avval ma'lumot yarating!");

        const clone = originalElement.cloneNode(true);
        
        // MathJax formulalarini Word-ga rasm sifatida kiritish uchun ishlov beramiz
        const containers = clone.querySelectorAll('mjx-container');
        for (const container of containers) {
            const svg = container.querySelector('svg');
            if (svg) {
                // SVG ni o'lchamlarini olish
                const bbox = svg.getBBox();
                svg.setAttribute("width", bbox.width);
                svg.setAttribute("height", bbox.height);
                
                // SVG ni base64 formatiga o'tkazish
                const svgString = new XMLSerializer().serializeToString(svg);
                const svgBase64 = btoa(unescape(encodeURIComponent(svgString)));
                const img = document.createElement('img');
                
                // Word tushunishi uchun biroz kattalashtiramiz
                img.src = `data:image/svg+xml;base64,${svgBase64}`;
                img.style.verticalAlign = "middle";
                img.style.margin = "5px";
                
                container.parentNode.replaceChild(img, container);
            }
        }

        const content = clone.innerHTML;
        const style = `
            <style>
                body { font-family: 'Times New Roman', serif; line-height: 1.5; font-size: 12pt; }
                table { border-collapse: collapse; width: 100%; margin: 10px 0; }
                th, td { border: 1px solid #000; padding: 5px; text-align: left; }
                h1, h2, h3 { color: #2563eb; }
            </style>
        `;

        const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'>" + style + "</head><body>";
        const footer = "</body></html>";
        const html = header + content + footer;

        // html-docx kutubxonasi yordamida blob yaratish
        const converted = htmlDocx.asBlob(html);
        saveAs(converted, `${fileName}_${Date.now()}.docx`);
    }
</script>

</body>
</html>
