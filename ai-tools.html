<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ziyo AI Studio | Ziyomap</title>
    <link rel="icon" type="image/png" href="icon-192x192.png">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/search-modal.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .back-link:hover {
            transform: translateX(-5px);
            background: #eef2ff;
        }

        .tool-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        h2 { color: var(--primary); display: flex; align-items: center; gap: 10px; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: 600; font-size: 0.85rem; color: #64748b; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }
        
        .btn-ai { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; font-size: 1rem; }
        .btn-ai:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37,99,235,0.3); }
        .btn-search { background: var(--secondary); }
        
        /* Daraja tanlash uchun badge-stil */
        .difficulty-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .difficulty-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 14px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
            text-align: center;
            color: #64748b;
        }
        .difficulty-btn.active-easy   { border-color: #10b981; background: #ecfdf5; color: #065f46; }
        .difficulty-btn.active-medium { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
        .difficulty-btn.active-hard   { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
        .difficulty-btn:hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
        .difficulty-label { font-weight: 600; font-size: 0.85rem; color: #64748b; margin-bottom: 8px; display: block; }

        .title-flex { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
        .btn-info-icon { background: #e2e8f0; color: #475569; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-info-icon:hover { background: #cbd5e1; color: #1e293b; }

        .result-area { 
            margin-top: 25px; padding: 40px; border-radius: 15px; 
            background: #fff; border: 1px solid #e2e8f0; display: none; 
            line-height: 1.8; color: #000; font-size: 13pt; text-align: justify;
        }

        .action-btns { display: none; gap: 10px; margin-top: 20px; }
        .btn-pdf { flex: 1; padding: 15px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; background: #ef4444; color: white; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn-pdf:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(239,68,68,0.3); }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table, th, td { border: 1px solid #000; padding: 12px; }
        th { background: #f1f5f9; }

        /* Krossvord karta rang */
        .crossword-card h2 { color: #e11d48; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .tool-card { padding: 20px; }
            .result-area { padding: 20px; font-size: 12pt; }
            .difficulty-btn { min-width: 70px; font-size: 0.78rem; padding: 8px 10px; }
        }
    </style>
</head>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();

    // Daraja tanlash — quiz va crossword uchun universal
    function selectDifficulty(prefix, btn) {
        const group = document.getElementById(prefix + '-difficulty-group');
        group.querySelectorAll('.difficulty-btn').forEach(b => {
            b.classList.remove('active-easy', 'active-medium', 'active-hard');
        });
        const val = btn.getAttribute('data-value');
        if (val === 'oson')        btn.classList.add('active-easy');
        else if (val === "o'rta")  btn.classList.add('active-medium');
        else if (val === 'qiyin')  btn.classList.add('active-hard');
        else                       btn.classList.add('active-easy'); // aralash
        document.getElementById(prefix + '-difficulty').value = val;
    }

    function showQuizInfo() {
        alert("ℹ️ TEST GENERATOR QO'LLANMASI:\n\n" +
              "1. Bitta mavzu bo'yicha test tuzish uchun oddiygina mavzu nomini yozing.\n" +
              "2. Agar bir nechta mavzuni qamrab olgan aralash test tuzmoqchi bo'lsangiz, ularni vergul (,) yoki ikki nuqta (:) bilan ajratib yozishingiz mumkin.\n" +
              "3. Daraja tanlang: Oson — oddiy, O'rta — o'ylantiruvchi, Qiyin — chuqur bilim talab etuvchi, Aralash — barcha darajalar qo'shilgan.\n\n" +
              "Masalan:\n" +
              "— To'g'ri chiziqli harakat, Tekis tezlanuvchan harakat\n" +
              "— Kvadrat tenglamalar: Viet teoremasi, Diskriminant usuli");
    }

    function showCrosswordInfo() {
        alert("ℹ️ KROSSVORD GENERATOR QO'LLANMASI:\n\n" +
              "1. Fanni va sinfni tanlang.\n" +
              "2. Krossvord tuzmoqchi bo'lgan mavzuni yozing.\n" +
              "3. Qiyinlik darajasini tanlang:\n" +
              "   🟢 Oson — oddiy atamalar, qisqa so'zlar\n" +
              "   🟡 O'rta — o'rta murakkablikdagi savollar\n" +
              "   🔴 Qiyin — chuqur bilim talab etuvchi atamalar\n\n" +
              "AI krossvord savollarini, javoblar jadvalini va bo'sh to'ldirish varaqasini tayyorlaydi.");
    }

    async function generate(type, btn) {
        const isLesson    = type === 'lesson';
        const isInfo      = type === 'info';
        const isQuiz      = type === 'quiz';
        const isCrossword = type === 'crossword';
        
        let topic = "";
        let resArea, btns, prompt;
        let label = '';

        if (isLesson) {
            topic   = document.getElementById('topic').value;
            resArea = document.getElementById('res-lesson');
            btns    = document.getElementById('btns-lesson');
            label   = 'dars rejasi';
        } else if (isInfo) {
            topic   = document.getElementById('info-topic').value;
            resArea = document.getElementById('res-info');
            btns    = document.getElementById('btns-info');
            label   = "ma'lumot";
        } else if (isQuiz) {
            topic   = document.getElementById('quiz-topic').value;
            resArea = document.getElementById('res-quiz');
            btns    = document.getElementById('btns-quiz');
            label   = 'testlar';
        } else if (isCrossword) {
            topic   = document.getElementById('cw-topic').value;
            resArea = document.getElementById('res-crossword');
            btns    = document.getElementById('btns-crossword');
            label   = 'krossvord';
        }

        if (!topic) return alert("Iltimos, mavzuni kiriting!");

        const notif = window.ZiyomapNotify ? ZiyomapNotify.loading('AI ' + label + ' tayyorlashni boshladi...') : null;

        const oldHTML = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> AI mantiqiy tahlil qilmoqda...';
        resArea.style.display = "block";
        resArea.innerHTML = "<div style='text-align:center'><i class='fas fa-brain fa-pulse'></i> Ma'lumotlar kengaytirilmoqda, iltimos kuting...</div>";

        if (isLesson) {
            prompt = `${document.getElementById('subject').value} fani ${document.getElementById('grade').value}-sinf "${topic}" mavzusida O'zbekiston darslik standartlariga mos dars ishlanmasi. Tarkibi: Mavzu maqsadi, metodlar, yangi mavzu bayoni (kengaytirilgan), amaliy mashqlar, savol-javoblar va jadvallar. LaTeX formulalarni $..$ ichida yoz.`;

        } else if (isInfo) {
            prompt = `"${topic}" mavzusi haqida akademik darajada batafsil ma'lumot ber. Tarixi, asosiy qoidalari, amaliy ahamiyati va jadval ko'rinishida qisqa faktlar bo'lsin. LaTeX ishlatilsin.`;

        } else if (isQuiz) {
            const quizSubject    = document.getElementById('quiz-subject').value;
            const quizCount      = document.getElementById('quiz-count').value;
            const quizDifficulty = document.getElementById('quiz-difficulty').value;

            let parsedTopics = topic;
            if (topic.includes(',') || topic.includes(':')) {
                parsedTopics = `quyidagi kiritilgan bir nechta mustaqil mavzularni o'z ichiga olgan aralash holdagi: "${topic}"`;
            } else {
                parsedTopics = `"${topic}"`;
            }

            let difficultyDesc = '';
            if (quizDifficulty === 'oson')       difficultyDesc = "Savollar sodda va tushunarli bo'lsin, asosiy tushunchalar tekshirilsin (oson daraja).";
            else if (quizDifficulty === "o'rta")  difficultyDesc = "Savollar o'rta murakkablikda bo'lsin, o'ylashni talab qilsin (o'rta daraja).";
            else if (quizDifficulty === 'qiyin')  difficultyDesc = "Savollar murakkab va chuqur bo'lsin, tahliliy fikrlashni talab qilsin (qiyin daraja).";
            else                                  difficultyDesc = "Savollar oson, o'rta va qiyin darajalarini teng qamrab olsin (aralash daraja).";

            prompt = `Siz ta'lim tizimi ekspertisiz. ${quizSubject} fani bo'yicha ${parsedTopics} mavzulari yuzasidan jami ${quizCount} ta mustaqil, variantli (A, B, C, D) test savollarini shakllantiring. ${difficultyDesc} Savollar tizimli va tushunarli bo'lsin. Barcha testlar tugagach, eng quyida to'g'ri javoblar kalitini (shpargalka/matritsa) jadval ko'rinishida taqdim eting. Agar fan aniq fan bo'lsa (Matematika, Fizika, Kimyo kabi), barcha matematik formulalar, tenglamalar, ildizlar va kasrlarni qat'iy ravishda $..$ (LaTeX) standartida yozing.`;

        } else if (isCrossword) {
            const cwSubject    = document.getElementById('cw-subject').value;
            const cwGrade      = document.getElementById('cw-grade').value;
            const cwDifficulty = document.getElementById('cw-difficulty').value;

            let cwDiffDesc = '';
            if (cwDifficulty === 'oson')       cwDiffDesc = "Savollar oddiy va bolalarga tushunarli bo'lsin, qisqa (4-6 harfli) so'zlar ishlatilsin.";
            else if (cwDifficulty === "o'rta")  cwDiffDesc = "Savollar o'rta murakkablikda bo'lsin, 5-8 harfli atamalar ishlatilsin.";
            else                               cwDiffDesc = "Savollar murakkab va chuqur bo'lsin, maxsus ilmiy atamalar (7-12 harf) ishlatilsin.";

            prompt = `Siz ${cwSubject} fani mutaxassisisiz. ${cwGrade}-sinf o'quvchilari uchun "${topic}" mavzusida krossvord tayyorlang. ${cwDiffDesc}

Quyidagi tartibda bering:

1. **KROSSVORD SAVOLLARI** — kamida 12 ta so'z. Har bir satr quyidagi formatda:
   - [raqam]. [Savol matni] → Javob: [SO'Z]

2. **KROSSVORD SXEMASI (jadval ko'rinishida)** — har bir so'z uchun qator va ustun raqamini, yo'nalishini (gorizontal / vertikal) ko'rsating:

| № | So'z | Boshlanish (qator, ustun) | Yo'nalish | Harflar soni |
|---|------|--------------------------|-----------|--------------|
| 1 | ... | ... | ... | ... |

3. **BO'SH KROSSVORD VARAG'I** — kataklarga raqamlar qo'yilgan holda chizib bering (ASCII art yoki jadval ko'rinishida).

4. **TO'LDIRILGANt KROSSVORD VARAG'I** — barcha harflar to'ldirilgan holda.

Krossvord to'g'ri kesishuvlarga ega bo'lsin (gorizontal va vertikal so'zlar umumiy harf orqali tutashsin).`;
        }

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: prompt })
            });
            const data = await response.json();
            resArea.innerHTML = marked.parse(data.reply);
            if (window.MathJax) await MathJax.typesetPromise([resArea]);
            btns.style.display = "flex";
            if (notif && window.ZiyomapNotify) {
                const successLabel = isLesson ? 'Dars rejasi' : isInfo ? "Ma'lumot" : isQuiz ? 'Testlar' : 'Krossvord';
                ZiyomapNotify.update(notif, '✅ ' + successLabel + ' muvaffaqiyatli tayyorlandi!', 'success');
            }
        } catch (e) { 
            resArea.innerHTML = "<span style='color:red'>Tarmoq xatosi! Qayta urinib ko'ring.</span>";
            if (notif && window.ZiyomapNotify) ZiyomapNotify.update(notif, "❌ Xatolik yuz berdi. Qayta urinib ko'ring.", 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = oldHTML;
        }
    }
