<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyomap AI | Dars Ishlanmasi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .tool-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Kirish cheklangan dizayni */
        .auth-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; border-radius: 20px; }
        
        .input-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-top: 5px; }
        
        .btn-ai { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-ai:hover { opacity: 0.9; transform: scale(1.02); }

        /* Natija maydoni */
        #result-area, #formula-result { 
            margin-top: 20px; padding: 25px; border-left: 5px solid var(--primary); 
            background: #fff; display: none; overflow-x: auto;
        }

        .action-btns { display: none; gap: 10px; margin-top: 15px; }
        .btn-download { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; background: #fff; }
        
        /* PRINT (YUKLASH) UCHUN MAXSUS STIL */
        @media print {
            body * { visibility: hidden; }
            .print-section, .print-section * { visibility: visible; }
            .print-section { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; font-size: 12pt; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #000; padding: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tool-card" style="position: relative;">
        <div id="auth-guard" class="auth-overlay" style="display: none;">
            <i class="fas fa-lock fa-2x"></i>
            <p>Tizimga kiring</p>
        </div>

        <h2><i class="fas fa-edit"></i> Professional Dars Ishlanmasi</h2>
        
        <div class="input-group">
            <select id="subject">
                <option value="Fizika">Fizika</option>
                <option value="Matematika">Matematika</option>
                <option value="Kimyo">Kimyo</option>
            </select>
            <input type="text" id="topic" placeholder="Mavzuni yozing (masalan: Issiqlik miqdori)">
            <select id="grade">
                <option value="9">9-sinf</option>
                <option value="10">10-sinf</option>
                <option value="11">11-sinf</option>
            </select>
        </div>

        <button class="btn-ai" id="gen-btn" onclick="generate()">
            <i class="fas fa-wand-magic-sparkles"></i> Reja yaratish
        </button>

        <div id="result-area" class="print-section"></div>

        <div class="action-btns" id="action-btns">
            <button class="btn-download" onclick="window.print()">
                <i class="fas fa-file-pdf" style="color: red;"></i> PDF sifatida saqlash
            </button>
            <button class="btn-download" onclick="downloadWord()">
                <i class="fas fa-file-word" style="color: blue;"></i> Word yuklash
            </button>
        </div>
    </div>
</div>

<script>
    // 1. AI Generatsiya
    async function generate() {
        const t = document.getElementById('topic').value;
        const s = document.getElementById('subject').value;
        const g = document.getElementById('grade').value;
        const btn = document.getElementById('gen-btn');
        const res = document.getElementById('result-area');

        if(!t) return alert("Mavzuni kiriting!");

        btn.disabled = true;
        btn.innerHTML = "Tayyorlanmoqda...";
        res.style.display = "block";
        res.innerHTML = "Ziyomap AI ma'lumot qidirmoqda...";

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: `${s} fani ${g}-sinf "${t}" mavzusida dars ishlanmasi tayyorla. Jadvallar ishlat. LaTeX formulalar $..$ ichida bo'lsin.` })
            });
            const data = await response.json();
            res.innerHTML = marked.parse(data.reply);
            
            if(window.MathJax) await MathJax.typesetPromise([res]);
            document.getElementById('action-btns').style.display = "flex";
        } catch (e) {
            res.innerHTML = "Xatolik yuz berdi.";
        } finally {
            btn.disabled = false;
            btn.innerHTML = "Reja yaratish";
        }
    }

    // 2. WORD YUKLASH (Eng yaxshi muqobil variant)
    function downloadWord() {
        const content = document.getElementById('result-area').innerHTML;
        const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><style>body{font-family:'Times New Roman',serif;} table{border-collapse:collapse; width:100%;} td,th{border:1px solid black; padding:5px;}</style></head><body>";
        const footer = "</body></html>";
        const sourceHTML = header + content + footer;
        
        const blob = new Blob(['\ufeff', sourceHTML], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'Dars_Ishlanmasi.doc';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
