<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyomap AI | Dars Ishlanmasi & Shpargalka</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .tool-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        h2 { color: var(--primary); display: flex; align-items: center; gap: 10px; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: 600; font-size: 0.9rem; color: #64748b; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-top: 5px; box-sizing: border-box; font-size: 1rem; }
        
        .btn-ai { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn-ai:hover { transform: scale(1.01); opacity: 0.9; }
        .btn-cheat { background: var(--secondary); }

        .result-area { 
            margin-top: 25px; padding: 30px; border-radius: 15px; 
            background: #fff; border: 1px solid #e2e8f0; display: none; 
            line-height: 1.8; color: #000; font-size: 14pt;
        }

        .action-btns { display: none; gap: 10px; margin-top: 20px; }
        .btn-action { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; background: #fff; font-weight: 600; }
        
        /* Print sozlamalari */
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; left: 0; top: 0; width: 100%; border: none; }
        }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        table, th, td { border: 1px solid #000; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tool-card" data-aos="fade-up">
        <h2><i class="fas fa-file-invoice"></i> Dars Ishlanmasi</h2>
        <div class="input-group">
            <select id="subject">
                <option value="Fizika">Fizika</option>
                <option value="Matematika">Matematika</option>
                <option value="Kimyo">Kimyo</option>
                <option value="Informatika">Informatika</option>
                <option value="Biologiya">Biologiya</option>
                <option value="Tarix">Tarix</option>
                <option value="O'zbek tili">O'zbek tili</option>
                <option value="Ingliz tili">Ingliz tili</option>
            </select>
        </div>
        <div class="input-group">
            <select id="grade">
                <option value="1">1-sinf</option><option value="2">2-sinf</option>...<option value="9" selected>9-sinf</option><option value="11">11-sinf</option>
            </select>
        </div>
        <input type="text" id="topic" placeholder="Mavzu nomi...">
        <button class="btn-ai" onclick="generate('lesson', this)">Reja yaratish</button>
        
        <div id="res-lesson" class="result-area"></div>
        <div class="action-btns" id="btns-lesson">
            <button class="btn-action" onclick="printDoc('res-lesson')"><i class="fas fa-file-pdf" style="color:red"></i> PDF</button>
            <button class="btn-action" onclick="saveImage('res-lesson')"><i class="fas fa-image" style="color:green"></i> Rasm</button>
        </div>
    </div>

    <div class="tool-card" data-aos="fade-up">
        <h2><i class="fas fa-bolt" style="color: #f59e0b;"></i> Aqlli Shpargalka</h2>
        <input type="text" id="cheat-topic" placeholder="Mavzu yoki formula nomi...">
        <button class="btn-ai btn-cheat" onclick="generate('cheat', this)">Shpargalka yaratish</button>
        
        <div id="res-cheat" class="result-area"></div>
        <div class="action-btns" id="btns-cheat">
            <button class="btn-action" onclick="printDoc('res-cheat')"><i class="fas fa-file-pdf" style="color:red"></i> PDF</button>
            <button class="btn-action" onclick="saveImage('res-cheat')"><i class="fas fa-image" style="color:green"></i> Rasm</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();

    async function generate(type, btn) {
        const isLesson = type === 'lesson';
        const topic = document.getElementById(isLesson ? 'topic' : 'cheat-topic').value;
        const resArea = document.getElementById(isLesson ? 'res-lesson' : 'res-cheat');
        const btns = document.getElementById(isLesson ? 'btns-lesson' : 'btns-cheat');

        if(!topic) return alert("Mavzuni yozing!");

        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Tayyorlanmoqda...';
        resArea.style.display = "block";
        resArea.innerHTML = "AI qidirmoqda...";

        let prompt = isLesson 
            ? `${document.getElementById('subject').value} fani ${document.getElementById('grade').value}-sinf "${topic}" mavzusida dars ishlanmasi. Jadvallar va LaTeX ishlat.`
            : `"${topic}" mavzusida eng kerakli formulalar va qisqa qoidalar jadvalini yarat. LaTeX $..$ ichida bo'lsin.`;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: prompt })
            });
            const data = await response.json();
            resArea.innerHTML = marked.parse(data.reply);
            if(window.MathJax) await MathJax.typesetPromise([resArea]);
            btns.style.display = "flex";
        } catch (e) { resArea.innerHTML = "Xatolik!"; }
        finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    function printDoc(id) {
        const area = document.getElementById(id);
        area.classList.add('print-area');
        window.print();
        area.classList.remove('print-area');
    }

    function saveImage(id) {
        const element = document.getElementById(id);
        html2canvas(element, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Ziyomap_AI.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
