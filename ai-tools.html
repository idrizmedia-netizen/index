<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyomap AI Asboblari | Dars Ishlanmasi & PDF</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #3b82f6;
            --dark-color: #1e293b;
            --light-bg: #f0f9ff;
            --text-color: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
        }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        /* Google Auth uchun qulflash ekrani */
        .auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        h2 { color: var(--primary-color); display: flex; align-items: center; gap: 10px; }

        .input-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            background: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .btn-ai {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .btn-ai:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }

        #result-area, #formula-result {
            margin-top: 25px;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            border-left: 5px solid var(--primary-color);
            display: none;
            line-height: 1.6;
            white-space: normal; 
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            display: none;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--dark-color);
            border: 1px solid #cbd5e1;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="text-decoration: none; color: var(--primary-color); font-weight: bold;">
        <i class="fas fa-arrow-left"></i> Orqaga qaytish
    </a>

    <div class="tool-card" data-aos="fade-up">
        <div id="auth-guard-1" class="auth-overlay">
            <i class="fas fa-lock fa-3x" style="color: var(--primary-color); margin-bottom: 15px;"></i>
            <h3>Kirish cheklangan</h3>
            <p>Ushbu vositadan foydalanish uchun asosiy sahifada Google orqali tizimga kiring.</p>
            <button class="btn-ai" onclick="window.location.href='index.html'">
                <i class="fab fa-google"></i> Tizimga kirish
            </button>
        </div>

        <h2><i class="fas fa-file-invoice"></i> Universal AI Dars Ishlanmasi</h2>
        
        <div class="input-group">
            <label>Fanni tanlang:</label>
            <select id="lesson-subject">
                <optgroup label="Aniq fanlar">
                    <option value="Matematika">Matematika</option>
                    <option value="Algebra">Algebra</option>
                    <option value="Geometriya">Geometriya</option>
                    <option value="Informatika">Informatika</option>
                </optgroup>
                <optgroup label="Tabiiy fanlar">
                    <option value="Fizika" selected>Fizika</option>
                    <option value="Kimyo">Kimyo</option>
                    <option value="Biologiya">Biologiya</option>
                    <option value="Geografiya">Geografiya</option>
                    <option value="Tabiiy fan (Science)">Tabiiy fan (Science)</option>
                </optgroup>
                <optgroup label="Filologiya">
                    <option value="O'zbek tili">O'zbek tili</option>
                    <option value="Ona tili va adabiyot">Ona tili va adabiyot</option>
                    <option value="Rus tili">Rus tili</option>
                    <option value="Ingliz tili">Ingliz tili</option>
                </optgroup>
                <optgroup label="Ijtimoiy fanlar">
                    <option value="Tarix">Tarix</option>
                    <option value="O'zbekiston tarixi">O'zbekiston tarixi</option>
                    <option value="Jahon tarixi">Jahon tarixi</option>
                    <option value="Tarbiya">Tarbiya</option>
                    <option value="Huquq">Huquq</option>
                </optgroup>
                <optgroup label="Amaliy fanlar">
                    <option value="Tasviriy san'at">Tasviriy san'at</option>
                    <option value="Musiqa">Musiqa</option>
                    <option value="Texnologiya">Texnologiya</option>
                    <option value="Jismoniy tarbiya">Jismoniy tarbiya</option>
                    <option value="CHYOT">CHYOT</option>
                </optgroup>
            </select>
        </div>

        <div class="input-group">
            <label>Mavzu nomi:</label>
            <input type="text" id="lesson-topic" placeholder="Masalan: Nyuton qonunlari yoki Optika...">
        </div>

        <div class="input-group">
            <label>Sinf:</label>
            <select id="lesson-grade">
                <option value="1-4">Boshlang'ich (1-4 sinf)</option>
                <option value="5">5-sinf</option>
                <option value="6">6-sinf</option>
                <option value="7">7-sinf</option>
                <option value="8">8-sinf</option>
                <option value="9" selected>9-sinf</option>
                <option value="10">10-sinf</option>
                <option value="11">11-sinf</option>
            </select>
        </div>

        <button class="btn-ai" onclick="generateLesson()">
            <i class="fas fa-magic"></i> Reja yaratish
        </button>

        <div id="result-area"></div>

        <div class="action-buttons" id="action-btns">
            <button class="btn-secondary" onclick="exportPDF('result-area')">
                <i class="fas fa-file-pdf"></i> PDF yuklab olish (Sifatli)
            </button>
        </div>
    </div>

    <div class="tool-card" data-aos="fade-up" data-aos-delay="200">
        <div id="auth-guard-2" class="auth-overlay">
            <i class="fas fa-lock fa-3x" style="color: var(--primary-color); margin-bottom: 15px;"></i>
            <h3>Kirish cheklangan</h3>
        </div>

        <h2><i class="fas fa-bolt"></i> Aqlli "Shpargalka" & Konspekt</h2>
        <div class="input-group">
            <label>Mavzu yoki bo'limni kiriting:</label>
            <input type="text" id="formula-query" placeholder="Formulalar va qisqa ma'lumotlar uchun...">
        </div>

        <button class="btn-ai" onclick="generateCheatSheet()">
            <i class="fas fa-search"></i> Ma'lumotlarni topish
        </button>

        <div id="formula-result"></div>

        <div class="action-buttons" id="formula-action-btns">
            <button class="btn-secondary" onclick="exportPDF('formula-result')">
                <i class="fas fa-file-pdf"></i> PDF yuklab olish
            </button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();

    // SIZ SO'RAGAN GOOGLE AUTH TEKSHIRUV FUNKSIYASI
    function checkGoogleAuth() {
        // Brauzer xotirasidan 'user' kalitini qidiramiz
        const user = localStorage.getItem('user'); 
        
        const guard1 = document.getElementById('auth-guard-1');
        const guard2 = document.getElementById('auth-guard-2');

        if (user) {
            // Agar ma'lumot bo'lsa, blokirovka (Overlay) ni yashiramiz
            if(guard1) guard1.style.display = 'none';
            if(guard2) guard2.style.display = 'none';
        } else {
            // Ma'lumot bo'lmasa, blokirovka ochiq turadi
            if(guard1) guard1.style.display = 'flex';
            if(guard2) guard2.style.display = 'flex';
        }
    }

    // Sahifa yuklanishi bilan ishga tushadi
    window.onload = checkGoogleAuth;

    // DARS ISHLANMASI GENERATSIYASI
    async function generateLesson() {
        const subject = document.getElementById('lesson-subject').value;
        const topic = document.getElementById('lesson-topic').value;
        const grade = document.getElementById('lesson-grade').value;
        const resultArea = document.getElementById('result-area');
        const actionBtns = document.getElementById('action-btns');

        if (!topic) return alert("Mavzuni yozing!");

        resultArea.style.display = "block";
        resultArea.innerHTML = "<i>Ziyomap AI dars rejasini va formulalarni tayyorlamoqda...</i>";

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: `${subject} fanidan ${grade}-sinf uchun "${topic}" mavzusida dars ishlanmasi tuzib ber. 
                    MUHIM: Barcha fizik yoki matematik formulalarni LaTeX formatida yoz (masalan, $$E=mc^2$$). 
                    Reja: 1. Maqsad. 2. Metodlar. 3. Borishi. 4. Savollar va topshiriqlar.` 
                })
            });

            const data = await response.json();
            resultArea.innerHTML = data.reply.replace(/\n/g, '<br>');
            
            if (window.MathJax) {
                MathJax.typesetPromise([resultArea]);
            }

            actionBtns.style.display = "flex";
        } catch (error) {
            resultArea.innerText = "Xatolik! Backend ulanishi topilmadi.";
        }
    }

    // SHPARGALKA GENERATSIYASI
    async function generateCheatSheet() {
        const query = document.getElementById('formula-query').value;
        const resultArea = document.getElementById('formula-result');
        const actionBtns = document.getElementById('formula-action-btns');

        if (!query) return alert("Mavzuni yozing!");

        resultArea.style.display = "block";
        resultArea.innerHTML = "<i>Qidirilmoqda...</i>";

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: `"${query}" mavzusi bo'yicha eng muhim formulalar, qisqa konspekt va qoidalar ber. 
                    Formulalarni albatta LaTeX ($$ ... $$) ko'rinishida ber.` 
                })
            });

            const data = await response.json();
            resultArea.innerHTML = data.reply.replace(/\n/g, '<br>');
            
            if (window.MathJax) {
                MathJax.typesetPromise([resultArea]);
            }

            actionBtns.style.display = "flex";
        } catch (error) {
            resultArea.innerText = "Xatolik yuz berdi.";
        }
    }

    // PDF EKSPORT (html2canvas orqali)
    async function exportPDF(elementId) {
        const element = document.getElementById(elementId);
        const { jsPDF } = window.jspdf;

        const canvas = await html2canvas(element, {
            scale: 2,
            useCORS: true,
            backgroundColor: "#ffffff"
        });

        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgProps = pdf.getImageProperties(imgData);
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        pdf.save(`Ziyomap_Eksport_${new Date().getTime()}.pdf`);
    }
</script>

</body>
</html>
