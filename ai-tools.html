<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <link rel="icon" type="image/png" href="icon-192x192.png">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/search-modal.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--primary); text-decoration: none; font-weight: 600;
            margin-bottom: 20px; padding: 10px 15px; background: white;
            border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .back-link:hover { transform: translateX(-5px); background: #eef2ff; }

        .tool-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h2 { display: flex; align-items: center; gap: 10px; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: 600; font-size: 0.85rem; color: #64748b; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }

        .btn-ai { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; font-size: 1rem; }
        .btn-ai:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37,99,235,0.3); }

        .title-flex { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
        .btn-info-icon { background: #e2e8f0; color: #475569; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .btn-info-icon:hover { background: #cbd5e1; }

        /* Difficulty / Mode selector */
        .mode-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .mode-btn {
            flex: 1; min-width: 90px; padding: 11px 10px;
            border-radius: 12px; border: 2px solid #e2e8f0;
            background: white; cursor: pointer; font-weight: 600;
            font-size: 0.82rem; text-align: center; color: #64748b;
            transition: 0.2s; line-height: 1.3;
        }
        .mode-btn:hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
        .mode-btn.active-1 { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; }
        .mode-btn.active-2 { border-color: #10b981; background: #ecfdf5; color: #065f46; }
        .mode-btn.active-3 { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
        .mode-label { font-weight: 600; font-size: 0.85rem; color: #64748b; margin-bottom: 8px; display: block; }

        /* Difficulty */
        .difficulty-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .difficulty-btn { flex: 1; min-width: 80px; padding: 10px 14px; border-radius: 50px; border: 2px solid #e2e8f0; background: white; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; text-align: center; color: #64748b; }
        .difficulty-btn.active-easy   { border-color: #10b981; background: #ecfdf5; color: #065f46; }
        .difficulty-btn.active-medium { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
        .difficulty-btn.active-hard   { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
        .difficulty-btn:hover { transform: translateY(-2px); }
        .difficulty-label { font-weight: 600; font-size: 0.85rem; color: #64748b; margin-bottom: 8px; display: block; }

        .result-area {
            margin-top: 25px; padding: 40px; border-radius: 15px;
            background: #fff; border: 1px solid #e2e8f0; display: none;
            line-height: 1.8; color: #000; font-size: 13pt; text-align: justify;
        }
        .action-btns { display: none; gap: 10px; margin-top: 20px; }
        .btn-pdf { flex: 1; padding: 15px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; background: #ef4444; color: white; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn-pdf:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(239,68,68,0.3); }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table, th, td { border: 1px solid #000; padding: 12px; }
        th { background: #f1f5f9; }

        /* Mode badge below result */
        .mode-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px; font-size: 0.78rem;
            font-weight: 700; margin-bottom: 15px;
        }
        .mode-badge.academic { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .mode-badge.school   { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
        .mode-badge.quick    { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .tool-card { padding: 15px; }
            .result-area { padding: 15px; font-size: 11pt; }
            .mode-btn { min-width: 80px; font-size: 0.75rem; }
        }
    </style>
</head>

<div class="container">
    <a href="/" class="back-link" data-aos="fade-right">
        <i class="fas fa-arrow-left"></i> Asosiy sahifaga qaytish
    </a>

    <!-- ===== DARS ISHLANMASI ===== -->
    <div class="tool-card" data-aos="fade-up">
        <h2 style="color:#2563eb"><i class="fas fa-chalkboard-teacher"></i> Professional Dars Ishlanmasi</h2>

        <div class="input-group">
            <label>Fanni tanlang:</label>
            <select id="subject">
                <option>Matematika</option>
                <option>Algebra</option>
                <option>Geometriya</option>
                <option>Fizika</option>
                <option>Kimyo</option>
                <option>Biologiya</option>
                <option>Informatika va AT</option>
                <option>O'zbek tili</option>
                <option>O'zbek adabiyoti</option>
                <option>Rus tili</option>
                <option>Ingliz tili</option>
                <option>Tarix</option>
                <option>O'zbekiston tarixi</option>
                <option>Jahon tarixi</option>
                <option>Geografiya</option>
                <option>Iqtisodiy va ijtimoiy geografiya</option>
                <option>Huquq</option>
                <option>Iqtisodiyot asoslari</option>
                <option>Tarbiya</option>
                <option>Tasviriy san'at</option>
                <option>Musiqa</option>
                <option>Texnologiya</option>
                <option>Chizmachilik</option>
                <option>Jismoniy tarbiya</option>
                <option>Ona tili</option>
                <option>Adabiy o'qish</option>
                <option>Atrofimizdagi olam</option>
                <option>Tabiatshunoslik</option>
                <option>Astronomiya</option>

        </div>

        <div class="input-group">
            <label>Sinfni tanlang:</label>
            <select id="grade" id="grade"></select>
        </div>

        <div class="input-group">
            <label>Dars turi:</label>
            <select id="lesson-type">

                <option value="mustahkamlash">Bilimlarni mustahkamlash darsi</option>
                <option value="takrorlash">Takrorlash va umumlashtirish darsi</option>
                <option value="nazorat">Nazorat darsi</option>
                <option value="aralash">Aralash (kombinatsiyalangan) dars</option>
                <option value="laboratoriya">Laboratoriya-amaliy dars</option>
                <option value="ekskursiya">Ekskursiya darsi</option>
            </select>
        </div>

        <div class="input-group">
            <label>Mavzu nomi:</label>
            <input type="text" id="topic" placeholder="Dars mavzusini to'liq yozing...">
        </div>

        <div class="input-group">
            <label>Darslik / O'quv qo'llanma (ixtiyoriy):</label>
            <input type="text" id="textbook" placeholder="Masalan: Saidaxmedov N. 7-sinf yoki standart DTS...">
        </div>

        <button class="btn-ai" onclick="generate('lesson', this)">
            <i class="fas fa-wand-magic-sparkles"></i> DTS standartida dars ishlanmasini yaratish
        </button>

        <div id="res-lesson" class="result-area"></div>
        <div class="action-btns" id="btns-lesson">
            <button class="btn-pdf" onclick="perfectPrint('res-lesson')">
                <i class="fas fa-file-pdf"></i> PDF yuklab olish
            </button>
        </div>
    </div>

    <!-- ===== MA'LUMOT TOPISH ===== -->
    <div class="tool-card" data-aos="fade-up">
        <h2 style="color:#f59e0b"><i class="fas fa-search-plus"></i> Ma'lumot Topish</h2>

        <div class="input-group">
            <label>Mavzu, qoida yoki termin nomi:</label>
            <input type="text" id="info-topic" placeholder="Nima haqida ma'lumot kerak?">
        </div>

        <!-- INFO MODE SELECTOR -->
        <div class="input-group">
            <span class="mode-label"><i class="fas fa-sliders-h"></i> Javob turini tanlang:</span>
            <div class="mode-group" id="info-mode-group">
                <button class="mode-btn active-1" data-value="academic" onclick="selectMode(this)">
                    🎓 Akademik<br><small style="font-weight:400;color:inherit;opacity:0.8">Ilmiy, chuqur tahlil</small>
                </button>
                <button class="mode-btn" data-value="school" onclick="selectMode(this)">
                    🏫 Maktab<br><small style="font-weight:400;color:inherit;opacity:0.8">O'quvchi uchun sodda</small>
                </button>
                <button class="mode-btn" data-value="quick" onclick="selectMode(this)">
                    ⚡ Tezkor javob<br><small style="font-weight:400;color:inherit;opacity:0.8">Qisqa, asosiy ma'lumot</small>
                </button>
            </div>
            <input type="hidden" id="info-mode" value="academic">
        </div>

        <button class="btn-ai" style="background:#f59e0b" onclick="generate('info', this)">
            <i class="fas fa-microscope"></i> Ma'lumot olish
        </button>

        <div id="res-info" class="result-area"></div>
        <div class="action-btns" id="btns-info">
            <button class="btn-pdf" onclick="perfectPrint('res-info')">
                <i class="fas fa-file-pdf"></i> PDF yuklab olish
            </button>
        </div>
    </div>

    <!-- ===== TEST GENERATOR ===== -->
    <div class="tool-card" data-aos="fade-up">
        <div class="title-flex">
            <h2 style="color:#8b5cf6;margin:0"><i class="fas fa-cubes"></i> Professional AI Test Generator</h2>
            <button class="btn-info-icon" onclick="showQuizInfo()"><i class="fas fa-info"></i></button>
        </div>

        <div class="input-group">
            <label>Fanni tanlang:</label>
            <select id="quiz-subject">
                <option>Matematika</option><option>Algebra</option><option>Geometriya</option>
                <option>Fizika</option><option>Kimyo</option><option>Biologiya</option>
                <option>Informatika va AT</option><option>O'zbek tili</option>
                <option>O'zbek adabiyoti</option><option>Ingliz tili</option>
                <option>Tarix</option><option>O'zbekiston tarixi</option>
                <option>Geografiya</option><option>Huquq</option><option>Iqtisodiyot asoslari</option>
                <option>Ona tili</option><option>Adabiy o'qish</option><option>Astronomiya</option>
            </select>
        </div>

        <div class="input-group">
            <label>Savollar sonini tanlang:</label>
            <select id="quiz-count">
                <option value="5">5 ta</option><option value="10">10 ta</option>
                <option value="15">15 ta</option><option value="20">20 ta</option>
                <option value="25">25 ta</option><option value="30">30 ta</option>
            </select>
        </div>

        <div class="input-group">
            <span class="difficulty-label"><i class="fas fa-signal"></i> Test darajasi:</span>
            <div class="difficulty-group" id="quiz-difficulty-group">
                <button class="difficulty-btn active-easy" data-value="oson" onclick="selectDifficulty('quiz',this)">🟢 Oson</button>
                <button class="difficulty-btn" data-value="o'rta" onclick="selectDifficulty('quiz',this)">🟡 O'rta</button>
                <button class="difficulty-btn" data-value="qiyin" onclick="selectDifficulty('quiz',this)">🔴 Qiyin</button>
                <button class="difficulty-btn" data-value="aralash" onclick="selectDifficulty('quiz',this)">🔀 Aralash</button>
            </div>
            <input type="hidden" id="quiz-difficulty" value="oson">
        </div>

        <div class="input-group">
            <label>Mavzu yoki mavzular:</label>
            <input type="text" id="quiz-topic" placeholder="Vergul bilan bir nechta mavzu yozish mumkin...">
        </div>

        <button class="btn-ai" style="background:#8b5cf6" onclick="generate('quiz',this)">
            <i class="fas fa-layer-group"></i> Variantli Testlarni Yaratish
        </button>

        <div id="res-quiz" class="result-area"></div>
        <div class="action-btns" id="btns-quiz">
            <button class="btn-pdf" onclick="perfectPrint('res-quiz')">
                <i class="fas fa-file-pdf"></i> PDF yuklab olish
            </button>
        </div>
    </div>

</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init();

// Grade select fill
const gradeEl = document.getElementById('grade');
if(gradeEl) for(let i=1;i<=11;i++) gradeEl.innerHTML += `<option value="${i}">${i}-sinf</option>`;

// ====== INFO MODE SELECTOR ======
function selectMode(btn) {
    document.getElementById('info-mode-group').querySelectorAll('.mode-btn')
        .forEach(b => b.classList.remove('active-1','active-2','active-3'));
    const v = btn.getAttribute('data-value');
    if(v==='academic') btn.classList.add('active-1');
    else if(v==='school') btn.classList.add('active-2');
    else btn.classList.add('active-3');
    document.getElementById('info-mode').value = v;
}

// ====== DIFFICULTY SELECTOR ======
function selectDifficulty(prefix, btn) {
    document.getElementById(prefix+'-difficulty-group').querySelectorAll('.difficulty-btn')
        .forEach(b => b.classList.remove('active-easy','active-medium','active-hard'));
    const v = btn.getAttribute('data-value');
    if(v==='oson') btn.classList.add('active-easy');
    else if(v==="o'rta") btn.classList.add('active-medium');
    else if(v==='qiyin') btn.classList.add('active-hard');
    else btn.classList.add('active-easy');
    document.getElementById(prefix+'-difficulty').value = v;
}

function showQuizInfo() {
    alert("ℹ️ TEST GENERATOR:\n\n• Bitta mavzu yoki vergul bilan bir nechta mavzu yozing.\n• Daraja: Oson / O'rta / Qiyin / Aralash.\n\nMisol: Kvadrat tenglamalar, Viet teoremasi");
}

// ====== MAIN GENERATE ======
async function generate(type, btn) {
    let topic='', resArea, btns, prompt, label='';

    if(type==='lesson') {
        topic = document.getElementById('topic').value.trim();
        resArea = document.getElementById('res-lesson');
        btns    = document.getElementById('btns-lesson');
        label   = 'dars ishlanmasi';
    } else if(type==='info') {
        topic = document.getElementById('info-topic').value.trim();
        resArea = document.getElementById('res-info');
        btns    = document.getElementById('btns-info');
        label   = "ma'lumot";
    } else if(type==='quiz') {
        topic = document.getElementById('quiz-topic').value.trim();
        resArea = document.getElementById('res-quiz');
        btns    = document.getElementById('btns-quiz');
        label   = 'testlar';
    }

    if(!topic) return alert("Iltimos, mavzuni kiriting!");

    const notif = window.ZiyomapNotify ? ZiyomapNotify.loading('AI ' + label + ' tayyorlamoqda...') : null;
    const old = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> AI tayyorlamoqda...';
    resArea.style.display = 'block';
    resArea.innerHTML = "<div style='text-align:center;padding:30px'><i class='fas fa-brain fa-pulse' style='font-size:2rem;color:#2563eb'></i><br><br><b>AI ishlamoqda, iltimos kuting...</b></div>";

    // ---- BUILD PROMPTS ----

    if(type === 'lesson') {
        const subject  = document.getElementById('subject').value;
        const grade    = document.getElementById('grade').value;
        const ltype    = document.getElementById('lesson-type').value;
        const textbook = document.getElementById('textbook').value.trim();

        const ltypeNames = {
            yangi_mavzu:    "Yangi mavzuni o'rgatish",
            mustahkamlash:  "Bilimlarni mustahkamlash",
            takrorlash:     "Takrorlash va umumlashtirish",
            nazorat:        "Nazorat darsi",
            aralash:        "Aralash (kombinatsiyalangan)",
            laboratoriya:   "Laboratoriya-amaliy",
            ekskursiya:     "Ekskursiya darsi"
        };

        prompt = `Siz O'zbekiston Davlat Ta'lim Standartlari (DTS) bo'yicha yuqori malakali metodik mutaxasssissiz. Quyidagi ma'lumotlarga asoslanib TO'LIQ va PROFESSIONAL dars ishlanmasi tuzing:

Fan: ${subject}
Sinf: ${grade}-sinf
Dars turi: ${ltypeNames[ltype]}
Mavzu: "${topic}"
${textbook ? `Darslik: ${textbook}` : `Darslik: O'zbekiston Respublikasi DTS talablari asosida`}

DARS ISHLANMASI TUZILMASI (barchasi batafsil bo'lsin):

## 📋 UMUMIY MA'LUMOTLAR
| Ko'rsatkich | Mazmun |
|---|---|
| Fan | ... |
| Sinf | ... |
| Mavzu | ... |
| Dars turi | ... |
| Dars vaqti | 45 daqiqa |
| Sana | __________ |

## 🎯 MAQSADLAR
**Ta'limiy maqsad:** (bilim va ko'nikmalar)
**Tarbiyaviy maqsad:** (axloqiy, vatanparvarlik va boshqa tarbiyaviy jihatlar)
**Rivojlantiruvchi maqsad:** (mantiqiy fikrlash, ijodiy qobiliyat)

## 📚 KOMPETENSIYALAR (DTS asosida)
- Funksional savodxonlik
- Kommunikativ kompetensiya
- Axborot kompetensiyasi
- (fanga xos kompetensiyalar)

## 🛠️ JIHOZLAR VA KO'RGAZMALI QUROLLAR
(doskа, proyektor, darslik, tarqatma materiallar, laboratoriya jihozlari va h.k.)

## 📖 DARS BOSQICHLARI

### I. TASHKILIY QISM (2-3 daqiqa)
(salomlashish, davomatni belgilash, darsga tayyorlik)

### II. O'TILGAN MAVZUNI TAKRORLASH (7-8 daqiqa)
(savollar, topshiriqlar — o'tilgan mavzu bo'yicha 3-4 ta savol)

### III. YANGI MAVZUNING BAYONI (20-25 daqiqa)
(mavzuni bosqichma-bosqich, tushunarli tarzda to'liq izohlash, misollar, formulalar, jadvallar, sxemalar)

### IV. MUSTAHKAMLASH (7-8 daqiqa)
(mashqlar, misollar, savol-javob — kamida 3-4 ta topshiriq)

### V. BAHOLASH (2-3 daqiqa)
(o'quvchilarni baholash mezonlari va ballari)

### VI. UY VAZIFASI (1-2 daqiqa)
(darslik sahifalari va mashqlari ko'rsatilsin)

## 📊 TEXNOLOGIK XARITA
| Dars bosqichi | Vaqt | O'qituvchi faoliyati | O'quvchi faoliyati | Metod |
|---|---|---|---|---|
| Tashkiliy qism | 2-3 min | ... | ... | ... |
| Takrorlash | 7-8 min | ... | ... | ... |
| Yangi mavzu | 20-25 min | ... | ... | ... |
| Mustahkamlash | 7-8 min | ... | ... | ... |
| Baholash | 2-3 min | ... | ... | ... |
| Uy vazifasi | 1-2 min | ... | ... | ... |

## 🧠 DIFFERENSIALLASHTIRILGAN YONDASHUV
- **Kuchli o'quvchilar uchun:** (qo'shimcha murakkab topshiriq)
- **O'rta o'quvchilar uchun:** (asosiy topshiriq)
- **Kuchsiz o'quvchilar uchun:** (sodda, ko'maklashuvchi topshiriq)

## 📝 NAZORAT SAVOLLARI
(mavzu bo'yicha 5-6 ta savol — bilim tekshirish uchun)

## 🔗 FANLARARO ALOQA
(ushbu mavzu boshqa qaysi fanlar bilan bog'liqligi)

Barcha matematik va kimyoviy formulalar, tenglamalar, belgilar LaTeX formatida ($...$) yozilsin.
Dars ishlanmasi O'zbekiston Respublikasi umumiy o'rta ta'lim DTS talablariga mos, zamonaviy pedagoglika metodlari (muammoli ta'lim, hamkorlik, tanqidiy fikrlash) qo'llanilgan holda yozilsin.`;

    } else if(type === 'info') {
        const mode = document.getElementById('info-mode').value;

        if(mode === 'academic') {
            prompt = `Siz ilmiy-akademik mutaxassis sifatida "${topic}" mavzusida to'liq, chuqur va ilmiy asoslangan ma'lumot bering.

Tarkibi:
## 📌 TA'RIF VA MOHIYAT
(ilmiy ta'rif, terminologiya, etimologiya)

## 📜 TARIXI VA RIVOJLANISHI
(qachon paydo bo'lgan, kim kashf etgan, tarixiy bosqichlar)

## 🔬 ASOSIY NAZARIY ASOSLAR
(qoidalar, qonunlar, teoremalar, formulalar, tushunchalar — batafsil)

## 🔢 FORMULALAR VA IFODALAR (agar mavjud bo'lsa)
(barcha tegishli formulalar va ularning izohlari)

## 💡 AMALIY QOʻLLANILISHI
(hayotda, fanda, sanoatda qanday ishlatiladi)

## 📊 TAQQOSLASH JADVALI (agar mavjud bo'lsa)
(o'xshash tushunchalar yoki turlar bilan taqqoslash)

## 🌐 ZAMONAVIY FAN VA TEXNOLOGIYADAGI O'RNI
(bugungi kunda ahamiyati)

## 📚 QISQACHA XULOSA VA MUHIM FAKTLAR JADVALI
| Ko'rsatkich | Ma'lumot |
|---|---|

LaTeX formulalarini $...$ ichida yozing.`;

        } else if(mode === 'school') {
            prompt = `Siz tajribali maktab o'qituvchisisiz. O'quvchilarga "${topic}" mavzusini oddiy, tushunarli va qiziqarli tarzda tushuntiring.

Tarkibi:
## 📖 ODDIY TA'RIF
(o'quvchi tushuna oladigan sodda so'zlar bilan)

## 🌟 ASOSIY TUSHUNCHALAR
(eng muhim 3-5 ta tushuncha — har biri sodda tushuntirilgan)

## 📝 FORMULALAR VA QOIDALAR (agar bo'lsa)
(misollar bilan birga)

## ✏️ MISOLLAR VA MASALALAR
(kamida 2-3 ta yechilgan misol — bosqichma-bosqich)

## 🎯 ESLAB QOLISH UCHUN
(qoida, mnemonika yoki qulay usul)

## ❓ O'Z-O'ZINI TEKSHIRISH SAVOLLARI
(5 ta savol — o'quvchi bilimini tekshirish uchun)

## 📌 XULOSA
(qisqacha 3-4 jumlada asosiy fikr)

Barcha formulalar LaTeX ($...$) formatida bo'lsin. Tilni sodda, do'stona va qiziqarli tuting.`;

        } else { // quick
            prompt = `"${topic}" haqida QISQA va ANIQ ma'lumot bering. Format:

## ⚡ ${topic.toUpperCase()} — TEZKOR MA'LUMOT

**Nima bu?** (1-2 jumla)

**Asosiy faktlar:**
- ...
- ...
- ...

**Formula/Qoida:** (agar bo'lsa — LaTeX bilan)

**Qo'llanilishi:** (1 jumla)

**Eslab qolish uchun:** (bitta qulay tavsif yoki qoida)

Javob qisqa, lo'nda va to'g'ridan-to'g'ri bo'lsin.`;
        }

    } else if(type === 'quiz') {
        const s = document.getElementById('quiz-subject').value;
        const c = document.getElementById('quiz-count').value;
        const d = document.getElementById('quiz-difficulty').value;
        const dd = d==='oson'?'Oson (oddiy, asosiy tushunchalar)':
                   d==="o'rta"?'O\'rta (o\'ylashni talab qiluvchi)':
                   d==='qiyin'?'Qiyin (chuqur tahliliy)':'Aralash (oson+o\'rta+qiyin)';
        const t = (topic.includes(',')||topic.includes(':'))
            ? `"${topic}" mavzulari aralash` : `"${topic}"`;

        prompt = `Siz ta'lim tizimi ekspertisiz. ${s} fani bo'yicha ${t} mavzusidan jami ${c} ta mustaqil test savoli tuzing.
Daraja: ${dd}

Har bir savol: A), B), C), D) variantlari bo'lsin.
Savollar turli xil bo'lsin: ta'rif, hisoblash, tahlil, qo'llash.
Oxirida to'g'ri javoblar kaliti jadval ko'rinishida:

| № | To'g'ri javob |
|---|---|
| 1 | A |
...

Aniq fanlarda (Matematika, Fizika, Kimyo) formulalar $...$ LaTeX formatida yozilsin.`;
    }

    // ---- API CALL ----
    try {
        const r = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: prompt })
        });
        const data = await r.json();

        // Add mode badge for info
        let badgeHTML = '';
        if(type === 'info') {
            const mode = document.getElementById('info-mode').value;
            const badges = {
                academic: `<div class="mode-badge academic"><i class="fas fa-graduation-cap"></i> Akademik javob</div>`,
                school:   `<div class="mode-badge school"><i class="fas fa-school"></i> Maktab darajasi</div>`,
                quick:    `<div class="mode-badge quick"><i class="fas fa-bolt"></i> Tezkor javob</div>`
            };
            badgeHTML = badges[mode] || '';
        }

        resArea.innerHTML = badgeHTML + marked.parse(data.reply);
        if(window.MathJax) await MathJax.typesetPromise([resArea]);
        btns.style.display = 'flex';
        if(notif && window.ZiyomapNotify) {
            ZiyomapNotify.update(notif, '✅ ' + (type==='lesson'?'Dars ishlanmasi':type==='info'?"Ma'lumot":'Testlar') + ' tayyor!', 'success');
        }
    } catch(e) {
        resArea.innerHTML = "<span style='color:red'>Tarmoq xatosi yuz berdi. Qayta urinib ko'ring.</span>";
        if(notif && window.ZiyomapNotify) ZiyomapNotify.update(notif, '❌ Xatolik', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = old;
    }
}
