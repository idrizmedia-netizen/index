<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ziyo AI Studio | Ziyomap</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/search-modal.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Qaytish tugmasi uchun yangi stil */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .back-link:hover {
            transform: translateX(-5px);
            background: #eef2ff;
        }

        .tool-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        h2 { color: var(--primary); display: flex; align-items: center; gap: 10px; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: 600; font-size: 0.85rem; color: #64748b; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }
        
        .btn-ai { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; font-size: 1rem; }
        .btn-ai:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37,99,235,0.3); }
        .btn-search { background: var(--secondary); }
        
        /* Test generator sarlavha dizayni */
        .title-flex { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
        .btn-info-icon { background: #e2e8f0; color: #475569; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-info-icon:hover { background: #cbd5e1; color: #1e293b; }

        .result-area { 
            margin-top: 25px; padding: 40px; border-radius: 15px; 
            background: #fff; border: 1px solid #e2e8f0; display: none; 
            line-height: 1.8; color: #000; font-size: 13pt; text-align: justify;
        }

        .action-btns { display: none; gap: 10px; margin-top: 20px; }
        .btn-pdf { flex: 1; padding: 15px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; background: #ef4444; color: white; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn-pdf:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(239,68,68,0.3); }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table, th, td { border: 1px solid #000; padding: 12px; }
        th { background: #f1f5f9; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .tool-card { padding: 20px; }
            .result-area { padding: 20px; font-size: 12pt; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-link" data-aos="fade-right">
        <i class="fas fa-arrow-left"></i> Asosiy sahifaga qaytish
    </a>

    <div class="tool-card" data-aos="fade-up">
        <h2><i class="fas fa-chalkboard-teacher"></i> Professional Dars Ishlanmasi</h2>
        <div class="input-group">
            <label>Fanni tanlang:</label>
            <select id="subject">
                <option value="Matematika">Matematika</option>
                <option value="Fizika">Fizika</option>
                <option value="Kimyo">Kimyo</option>
                <option value="Biologiya">Biologiya</option>
                <option value="Informatika">Informatika</option>
                <option value="O'zbek tili">O'zbek tili</option>
                <option value="Adabiyot">Adabiyot</option>
                <option value="Ingliz tili">Ingliz tili</option>
                <option value="Tarix">Tarix</option>
                <option value="Geografiya">Geografiya</option>
                <option value="Huquq">Huquq</option>
                <option value="Iqtisodiyot">Iqtisodiyot</option>
                <option value="Tarbiya">Tarbiya</option>
                <option value="Tasviriy san'at">Tasviriy san'at</option>
                <option value="Musiqa">Musiqa</option>
                <option value="Texnologiya">Texnologiya</option>
                <option value="Chizmachilik">Chizmachilik</option>
                <option value="Jismoniy tarbiya">Jismoniy tarbiya</option>
            </select>
        </div>
        <div class="input-group">
            <label>Sinfni tanlang:</label>
            <select id="grade">
                <script>
                    for(let i=1; i<=11; i++) {
                        document.write(`<option value="${i}">${i}-sinf</option>`);
                    }
                </script>
            </select>
        </div>
        <div class="input-group">
            <label>Mavzu nomi:</label>
            <input type="text" id="topic" placeholder="Mavzuni to'liq yozing...">
        </div>
        <button class="btn-ai" onclick="generate('lesson', this)">
            <i class="fas fa-wand-magic-sparkles"></i> Mukammal reja yaratish
        </button>
        
        <div id="res-lesson" class="result-area"></div>
        <div class="action-btns" id="btns-lesson">
            <button class="btn-pdf" onclick="perfectPrint('res-lesson')">
                <i class="fas fa-file-pdf"></i> Sifatli PDF yuklab olish
            </button>
        </div>
    </div>

    <div class="tool-card" data-aos="fade-up">
        <h2><i class="fas fa-search-plus" style="color: #f59e0b;"></i> Mukammal Ma'lumot Topish</h2>
        <div class="input-group">
            <label>Mavzu, qoida yoki termin nomi:</label>
            <input type="text" id="info-topic" placeholder="Nima haqida ma'lumot kerak?">
        </div>
        <button class="btn-ai btn-search" onclick="generate('info', this)">
            <i class="fas fa-microscope"></i> Chuqur tahlil qilish
        </button>
        
        <div id="res-info" class="result-area"></div>
        <div class="action-btns" id="btns-info">
            <button class="btn-pdf" onclick="perfectPrint('res-info')">
                <i class="fas fa-file-pdf"></i> Sifatli PDF yuklab olish
            </button>
        </div>
    </div>

    <div class="tool-card" data-aos="fade-up">
        <div class="title-flex">
            <h2 style="color: #8b5cf6; margin: 0;"><i class="fas fa-cubes"></i> Professional AI Test Generator</h2>
            <button class="btn-info-icon" onclick="showQuizInfo()" title="Mavzu kiritish bo'yicha yo'riqnoma">
                <i class="fas fa-info"></i>
            </button>
        </div>
        
        <div class="input-group">
            <label>Fanni tanlang:</label>
            <select id="quiz-subject">
                <option value="Matematika">Matematika</option>
                <option value="Fizika">Fizika</option>
                <option value="Kimyo">Kimyo</option>
                <option value="Biologiya">Biologiya</option>
                <option value="Informatika">Informatika</option>
                <option value="O'zbek tili">O'zbek tili</option>
                <option value="Ona tili">Ona tili</option>
                <option value="Adabiyot">Adabiyot</option>
                <option value="Ingliz tili">Ingliz tili</option>
                <option value="Tarix">Tarix</option>
                <option value="Geografiya">Geografiya</option>
                <option value="Huquq">Huquq</option>
                <option value="Iqtisodiyot">Iqtisodiyot</option>
                <option value="Tarbiya">Tarbiya</option>
                <option value="Tasviriy san'at">Tasviriy san'at</option>
                <option value="Musiqa">Musiqa</option>
                <option value="Texnologiya">Texnologiya</option>
                <option value="Chizmachilik">Chizmachilik</option>
                <option value="Jismoniy tarbiya">Jismoniy tarbiya</option>
            </select>
        </div>

        <div class="input-group">
            <label>Savollar sonini tanlang:</label>
            <select id="quiz-count">
                <option value="5">5 ta savol</option>
                <option value="10">10 ta savol</option>
                <option value="15">15 ta savol</option>
                <option value="20">20 ta savol</option>
                <option value="25">25 ta savol</option>
                <option value="30">30 ta savol</option>
            </select>
        </div>

        <div class="input-group">
            <label>Mavzu yoki mavzular nomi:</label>
            <input type="text" id="quiz-topic" placeholder="Mavzuni yozing (Bir nechta bo'lsa, vergul yoki ikki nuqta bilan ajrating)...">
        </div>

        <button class="btn-ai" style="background: #8b5cf6;" onclick="generate('quiz', this)">
            <i class="fas fa-layer-group"></i> Variantli Testlarni Yaratish
        </button>
        
        <div id="res-quiz" class="result-area"></div>
        <div class="action-btns" id="btns-quiz">
            <button class="btn-pdf" onclick="perfectPrint('res-quiz')">
                <i class="fas fa-file-pdf"></i> Sifatli PDF yuklab olish
            </button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();

    // Yo'riqnoma tugmasi bosilganda chiquvchi ma'lumot oynasi
    function showQuizInfo() {
        alert("ℹ️ TEST GENERATOR QO'LLANMASI:\n\n" +
              "1. Bitta mavzu bo'yicha test tuzish uchun oddiygina mavzu nomini yozing.\n" +
              "2. Agar bir nechta mavzuni qamrab olgan aralash test tuzmoqchi bo'lsangiz, ularni vergul (,) yoki ikki nuqta (:) bilan ajratib yozishingiz mumkin.\n\n" +
              "Masalan:\n" +
              "— To'g'ri chiziqli harakat, Tekis tezlanuvchan harakat\n" +
              "— Kvadrat tenglamalar: Viet teoremasi, Diskriminant usuli");
    }

    async function generate(type, btn) {
        const isLesson = type === 'lesson';
        const isInfo = type === 'info';
        const isQuiz = type === 'quiz';
        
        let topic = "";
        let resArea, btns, prompt;
        let label = '';

        if (isLesson) {
            topic = document.getElementById('topic').value;
            resArea = document.getElementById('res-lesson');
            btns = document.getElementById('btns-lesson');
            label = 'dars rejasi';
        } else if (isInfo) {
            topic = document.getElementById('info-topic').value;
            resArea = document.getElementById('res-info');
            btns = document.getElementById('btns-info');
            label = 'ma\'lumot';
        } else if (isQuiz) {
            topic = document.getElementById('quiz-topic').value;
            resArea = document.getElementById('res-quiz');
            btns = document.getElementById('btns-quiz');
            label = 'testlar';
        }

        if(!topic) return alert("Iltimos, mavzuni kiriting!");

        const notif = window.ZiyomapNotify ? ZiyomapNotify.loading('AI ' + label + ' tayyorlashni boshladi...') : null;

        const oldHTML = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> AI mantiqiy tahlil qilmoqda...';
        resArea.style.display = "block";
        resArea.innerHTML = "<div style='text-align:center'><i class='fas fa-brain fa-pulse'></i> Ma'lumotlar kengaytirilmoqda, iltimos kuting...</div>";

        if (isLesson) {
            prompt = `${document.getElementById('subject').value} fani ${document.getElementById('grade').value}-sinf "${topic}" mavzusida O'zbekiston darslik standartlariga mos dars ishlanmasi. Tarkibi: Mavzu maqsadi, metodlar, yangi mavzu bayoni (kengaytirilgan), amaliy mashqlar, savol-javoblar va jadvallar. LaTeX formulalarni $..$ ichida yoz.`;
        } else if (isInfo) {
            prompt = `"${topic}" mavzusi haqida akademik darajada batafsil ma'lumot ber. Tarixi, asosiy qoidalari, amaliy ahamiyati va jadval ko'rinishida qisqa faktlar bo'lsin. LaTeX ishlatilsin.`;
        } else if (isQuiz) {
            const quizSubject = document.getElementById('quiz-subject').value;
            const quizCount = document.getElementById('quiz-count').value;
            
            // Vergul yoki ikki nuqta orqali ko'p mavzulilikni tahlil qilish mantig'i
            let parsedTopics = topic;
            if (topic.includes(',') || topic.includes(':')) {
                parsedTopics = `quyidagi kiritilgan bir nechta mustaqil mavzularni o'z ichiga olgan aralash holdagi: "${topic}"`;
            } else {
                parsedTopics = `"${topic}"`;
            }

            prompt = `Siz ta'lim tizimi ekspertisiz. ${quizSubject} fani bo'yicha ${parsedTopics} mavzulari yuzasidan jami ${quizCount} ta mustaqil, variantli (A, B, C, D) test savollarini shakllantiring. Savollar tizimli va tushunarli bo'lsin. Barcha testlar tugagach, eng quyida to'g'ri javoblar kalitini (shpargalka/matritsa) jadval ko'rinishida taqdim eting. Agar fan aniq fan bo'lsa (Matematika, Fizika, Kimyo kabi), barcha matematik formulalar, tenglamalar, ildizlar va kasrlarni qat'iy ravishda $..$ (LaTeX) standartida yozing.`;
        }

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: prompt })
            });
            const data = await response.json();
            resArea.innerHTML = marked.parse(data.reply);
            if(window.MathJax) await MathJax.typesetPromise([resArea]);
            btns.style.display = "flex";
            if (notif && window.ZiyomapNotify) ZiyomapNotify.update(notif, '✅ ' + (isLesson?'Dars rejasi':isInfo?'Ma\'lumot':'Testlar') + ' muvaffaqiyatli tayyorlandi!', 'success');
        } catch (e) { 
            resArea.innerHTML = "<span style='color:red'>Tarmoq xatosi! Qayta urinib ko'ring.</span>";
            if (notif && window.ZiyomapNotify) ZiyomapNotify.update(notif, '❌ Xatolik yuz berdi. Qayta urinib ko\'ring.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = oldHTML;
        }
    }

    async function perfectPrint(id) {
        const area = document.getElementById(id);
        
        if (window.MathJax) {
            await MathJax.typesetPromise([area]);
        }

        const content = area.innerHTML;
        const pWin = window.open('', '', 'height=900,width=1100');
        
        pWin.document.write(`
            <html>
                <head>
                    <title>Ziyomap AI - Export</title>
                    <style>
                        body { 
                            font-family: 'Times New Roman', serif; 
                            padding: 40px; 
                            line-height: 1.6; 
                            color: #000; 
                            background: #fff; 
                        }
                        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                        th, td { border: 1px solid #000; padding: 10px; text-align: left; }
                        th { background: #f2f2f2 !important; -webkit-print-color-adjust: exact; }
                        
                        mjx-container { 
                            display: inline-block !important; 
                            vertical-align: middle;
                            margin: 5px 0;
                            line-height: 0;
                        }
                        svg { max-width: 100%; }

                        @media print {
                            @page { size: A4; margin: 1.5cm; }
                            body { padding: 0; }
                        }
                    </style>
                </head>
                <body>
                    <div style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px; margin-bottom:30px;">
                        <h1 style="margin:0">ZIYOMAP AI</h1>
                        <p style="margin:5px 0">Professional Ta'lim va Metodik Platforma</p>
                    </div>
                    
                    <div id="print-content">
                        ${content}
                    </div>

                    <script>
                        window.onload = function() {
                            setTimeout(() => {
                                window.print();
                                // window.close(); 
                            }, 800); 
                        };
                    <\/script>
                </body>
            </html>
        `);
        pWin.document.close();
    }
</script>
<script src="js/ziyomap-usage.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/notifications.js"></script>
<script src="js/search-modal.js"></script>
<script>ZiyomapAuthGuard.protectPage();</script>
<script>
document.addEventListener('keydown', function(e){
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    if (window.ZiyomapSearch) ZiyomapSearch.open();
  }
});
</script>
</body>
</html>
