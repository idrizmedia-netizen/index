<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyomap AI | Professional Ta'lim Platformasi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --warning: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .back-link:hover {
            transform: translateX(-5px);
            background: #eef2ff;
        }

        .tool-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        h2 { color: var(--primary); display: flex; align-items: center; gap: 10px; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: 600; font-size: 0.85rem; color: #64748b; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }
        
        .btn-ai { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; font-size: 1rem; }
        .btn-ai:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37,99,235,0.3); }
        .btn-search { background: var(--warning); }
        .btn-quiz { background: var(--secondary); }

        .result-area { 
            margin-top: 25px; padding: 40px; border-radius: 15px; 
            background: #fff; border: 1px solid #e2e8f0; display: none; 
            line-height: 1.8; color: #000; font-size: 13pt; text-align: justify;
        }

        .action-btns { display: none; gap: 10px; margin-top: 20px; }
        .btn-pdf { flex: 1; padding: 15px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; background: #ef4444; color: white; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn-pdf:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(239,68,68,0.3); }
        .btn-word { background: #217346; }
        .btn-word:hover { background: #164a2e; box-shadow: 0 5px 15px rgba(33,115,70,0.3); }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table, th, td { border: 1px solid #000; padding: 12px; }
        th { background: #f1f5f9; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .tool-card { padding: 20px; }
            .result-area { padding: 20px; font-size: 12pt; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-link" data-aos="fade-right">
        <i class="fas fa-arrow-left"></i> Asosiy sahifaga qaytish
    </a>

    <div class="tool-card" data-aos="fade-up">
        <h2><i class="fas fa-chalkboard-teacher"></i> Professional Dars Ishlanmasi</h2>
        <div class="input-group">
            <label>Fanni tanlang:</label>
            <select id="subject">
                <option value="Matematika">Matematika</option>
                <option value="Fizika">Fizika</option>
                <option value="Kimyo">Kimyo</option>
                <option value="Biologiya">Biologiya</option>
                <option value="Informatika">Informatika</option>
                <option value="O'zbek tili">O'zbek tili</option>
                <option value="Adabiyot">Adabiyot</option>
                <option value="Ingliz tili">Ingliz tili</option>
                <option value="Tarix">Tarix</option>
                <option value="Geografiya">Geografiya</option>
            </select>
        </div>
        <div class="input-group">
            <label>Sinfni tanlang:</label>
            <select id="grade">
                <script>
                    for(let i=1; i<=11; i++) {
                        document.write(`<option value="${i}">${i}-sinf</option>`);
                    }
                </script>
            </select>
        </div>
        <div class="input-group">
            <label>Mavzu nomi:</label>
            <input type="text" id="topic" placeholder="Mavzuni to'liq yozing...">
        </div>
        <button class="btn-ai" onclick="generate('lesson', this)">
            <i class="fas fa-wand-magic-sparkles"></i> Mukammal reja yaratish
        </button>
        
        <div id="res-lesson" class="result-area"></div>
        <div class="action-btns" id="btns-lesson">
            <button class="btn-pdf" onclick="perfectPrint('res-lesson')">
                <i class="fas fa-file-pdf"></i> Sifatli PDF / Chop etish
            </button>
        </div>
    </div>

    <div class="tool-card" data-aos="fade-up">
        <h2><i class="fas fa-search-plus" style="color: var(--warning);"></i> Mukammal Ma'lumot Topish</h2>
        <div class="input-group">
            <label>Mavzu, qoida yoki termin nomi:</label>
            <input type="text" id="info-topic" placeholder="Nima haqida ma'lumot kerak?">
        </div>
        <button class="btn-ai btn-search" onclick="generate('info', this)">
            <i class="fas fa-microscope"></i> Chuqur tahlil qilish
        </button>
        
        <div id="res-info" class="result-area"></div>
        <div class="action-btns" id="btns-info">
            <button class="btn-pdf" onclick="perfectPrint('res-info')">
                <i class="fas fa-file-pdf"></i> Sifatli PDF / Chop etish
            </button>
        </div>
    </div>

    <div class="tool-card" data-aos="fade-up">
        <h2><i class="fas fa-tasks" style="color: var(--secondary);"></i> Professional AI Test Generator</h2>
        <div class="input-group">
            <label>Fanni tanlang:</label>
            <select id="quiz-subject">
                <option value="Matematika">Matematika</option>
                <option value="Fizika">Fizika</option>
                <option value="Kimyo">Kimyo</option>
                <option value="Biologiya">Biologiya</option>
                <option value="Informatika">Informatika</option>
                <option value="O'zbek tili">O'zbek tili</option>
                <option value="Tarix">Tarix</option>
            </select>
        </div>
        <div class="flex-row" style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div class="input-group" style="flex: 1;">
                <label>Savollar soni:</label>
                <select id="quiz-count">
                    <option value="5">5 ta savol</option>
                    <option value="10">10 ta savol</option>
                    <option value="15">15 ta savol</option>
                    <option value="20">20 ta savol</option>
                </select>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Murakkablik darajasi:</label>
                <select id="quiz-level">
                    <option value="oson">Oson (Baza)</option>
                    <option value="o'rta">O'rta (Standard)</option>
                    <option value="murakkab">Murakkab (Olimpiada / Attestatsiya)</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Test olinadigan mavzu nomi:</label>
            <input type="text" id="quiz-topic" placeholder="Masalan: To'g'ri chiziqli tekis harakat yoki Kvadrat tenglamalar...">
        </div>
        <button class="btn-ai btn-quiz" onclick="generate('quiz', this)">
            <i class="fas fa-graduation-cap"></i> Variantli Testlarni Shakllantirish
        </button>
        
        <div id="res-quiz" class="result-area"></div>
        <div class="action-btns" id="btns-quiz">
            <button class="btn-pdf" onclick="perfectPrint('res-quiz')">
                <i class="fas fa-print"></i> Printerdan Chop Etish (PDF)
            </button>
            <button class="btn-pdf btn-word" onclick="downloadWord('res-quiz')">
                <i class="fas fa-file-word"></i> MS Word (Xatosiz) Yuklash
            </button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();

    async function generate(type, btn) {
        let topic, resArea, btns, prompt;
        const oldHTML = btn.innerHTML;

        if (type === 'lesson') {
            topic = document.getElementById('topic').value;
            resArea = document.getElementById('res-lesson');
            btns = document.getElementById('btns-lesson');
            if(!topic) return alert("Iltimos, dars ishlanmasi mavzusini kiriting!");
            
            prompt = `${document.getElementById('subject').value} fani ${document.getElementById('grade').value}-sinf "${topic}" mavzusida O'zbekiston darslik standartlariga mos dars ishlanmasi. Tarkibi: Mavzu maqsadi, metodlar, yangi mavzu bayoni (kengaytirilgan), amaliy mashqlar, savol-javoblar va jadvallar. LaTeX formulalarni $..$ ichida yoz.`;
        } 
        else if (type === 'info') {
            topic = document.getElementById('info-topic').value;
            resArea = document.getElementById('res-info');
            btns = document.getElementById('btns-info');
            if(!info-topic) return alert("Iltimos, chuqur tahlil uchun termin kiriting!");

            prompt = `"${topic}" mavzusi haqida akademik darajada batafsil ma'lumot ber. Tarixi, asosiy qoidalari, amaliy ahamiyati va jadval ko'rinishida qisqa faktlar bo'lsin. LaTeX ishlatilsin.`;
        } 
        else if (type === 'quiz') {
            topic = document.getElementById('quiz-topic').value;
            resArea = document.getElementById('res-quiz');
            btns = document.getElementById('btns-quiz');
            const sub = document.getElementById('quiz-subject').value;
            const count = document.getElementById('quiz-count').value;
            const lvl = document.getElementById('quiz-level').value;
            
            if(!topic) return alert("Iltimos, test mavzusini kiriting!");

            prompt = `Siz professional ta'lim ekspertisiz. ${sub} fanidan "${topic}" mavzusi bo'yicha jami ${count} ta har biriga A, B, C, D variantlari bor ${lvl} darajadagi test savollarini tuzing. Savollar oxirida to'g'ri javoblar kalitini ko'rsating. Agar fan aniq fan bo'lsa, barcha matematik formulalar, amallar, ildizlar va darajalar qat'iy ravishda $..$ (LaTeX standartida) ichida yozilsin (Masalan: $v = \\frac{s}{t}$ yoki $x^2 + 2x = 0$). Matn Markdown formatida chiroyli tartiblangan bo'lsin.`;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> Ziyomap AI hisoblamoqda...';
        resArea.style.display = "block";
        resArea.innerHTML = "<div style='text-align:center'><i class='fas fa-brain fa-pulse'></i> Formulalar va savollar struktura qilinmoqda, kuting...</div>";

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: prompt })
            });
            const data = await response.json();
            resArea.innerHTML = marked.parse(data.reply);
            if(window.MathJax) await MathJax.typesetPromise([resArea]);
            btns.style.display = "flex";
        } catch (e) { 
            resArea.innerHTML = "<span style='color:red'>Ulanishda xatolik yuz berdi! Qayta urining.</span>"; 
        } finally {
            btn.disabled = false;
            btn.innerHTML = oldHTML;
        }
    }

    // WORD DASTURIGA FORMULALARNI XATOSIZ EKSPORT QILISH LOGIKASI
    function downloadWord(id) {
        const content = document.getElementById(id).innerHTML;
        const subName = document.getElementById('quiz-subject').value;
        const topName = document.getElementById('quiz-topic').value;
        
        // Word formulalarni o'qishi uchun HTML fayl shaklida yuboramiz
        const converted = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
            <title>Ziyomap Test Eksport</title>
            <style>
                body { font-family: 'Times New Roman', serif; line-height: 1.5; padding: 20px; }
                p, div { font-size: 12pt; }
                h1, h2, h3 { text-align: center; color: #111; }
                table { width: 100%; border-collapse: collapse; margin-top: 15px; }
                th, td { border: 1px solid #000; padding: 8px; font-size: 11pt; }
                .footer-text { text-align: center; font-size: 10pt; margin-top: 40px; border-top: 1px solid #ccc; padding-top: 10px; }
            </style>
        </head>
        <body>
            <div style="text-align:center; margin-bottom:20px;">
                <h2>${subName.toUpperCase()} FANIDAN MAVZUIY TESTLAR</h2>
                <p><b>Mavzu:</b> ${topName}</p>
            </div>
            <hr/>
            ${content}
            <div class="footer-text">Ziyomap AI - O'qituvchilar uchun professional yordamchi platforma</div>
        </body>
        </html>`;

        const blob = new Blob(['\ufeff' + converted], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Ziyomap_Test_${subName}_${topName.replace(/ /g, "_")}.doc`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    async function perfectPrint(id) {
        const area = document.getElementById(id);
        if (window.MathJax) await MathJax.typesetPromise([area]);

        const content = area.innerHTML;
        const pWin = window.open('', '', 'height=900,width=1100');
        
        pWin.document.write(`
            <html>
                <head>
                    <title>Ziyomap AI - Print System</title>
                    <style>
                        body { font-family: 'Times New Roman', serif; padding: 40px; line-height: 1.6; color: #000; background: #fff; }
                        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                        th, td { border: 1px solid #000; padding: 10px; text-align: left; }
                        th { background: #f2f2f2 !important; -webkit-print-color-adjust: exact; }
                        mjx-container { display: inline-block !important; vertical-align: middle; margin: 5px 0; line-height: 0; }
                        svg { max-width: 100%; }
                        @media print {
                            @page { size: A4; margin: 1.5cm; }
                            body { padding: 0; }
                        }
                    </style>
                </head>
                <body>
                    <div style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px; margin-bottom:30px;">
                        <h1 style="margin:0">ZIYOMAP AI</h1>
                        <p style="margin:5px 0">Professional Ta'lim va Metodik Platforma</p>
                    </div>
                    <div id="print-content">${content}</div>
                    <script>
                        window.onload = function() {
                            setTimeout(() => { window.print(); }, 800); 
                        };
                    <\/script>
                </body>
            </html>
        `);
        pWin.document.close();
    }
</script>
</body>
</html>
