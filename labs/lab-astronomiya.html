<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>3D Astronomiya</title>
    <style>body { margin: 0; background: #000; overflow: hidden; }</style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "dat.gui": "https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.module.js"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GUI } from 'dat.gui';

        // 1. Sahna va Render
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Quyosh va Yer
        const sun = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
        scene.add(sun);

        const earth = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshStandardMaterial({ color: 0x2233ff }));
        const orbit = new THREE.Object3D();
        scene.add(orbit);
        orbit.add(earth);
        earth.position.x = 7;

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        camera.position.z = 20;

        // 3. Boshqaruv
        const params = { speed: 0.01 };
        const gui = new GUI();
        gui.add(params, 'speed', 0, 0.05).name('Tezlik');

        function animate() {
            requestAnimationFrame(animate);
            orbit.rotation.y += params.speed;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
