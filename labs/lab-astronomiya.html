<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Interaktiv Fizika Laboratoriyasi</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "dat.gui": "https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.module.js"
        } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GUI } from 'dat.gui';

        // 1. Sahna
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Quyosh va Yer
        const sun = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
        scene.add(sun);

        const earth = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshStandardMaterial({ color: 0x2233ff }));
        const orbit = new THREE.Object3D();
        scene.add(orbit);
        orbit.add(earth);
        earth.position.x = 7;

        scene.add(new THREE.PointLight(0xffffff, 100, 50));
        scene.add(new THREE.AmbientLight(0x222222));
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        // 3. Boshqaruv paneli (PhET uslubi)
        const params = { speed: 0.01, distance: 7 };
        const gui = new GUI();
        gui.add(params, 'speed', 0, 0.05).name('Orbita tezligi');
        gui.add(params, 'distance', 5, 15).name('Masofa (AU)').onChange(v => earth.position.x = v);

        // 4. Animatsiya
        function animate() {
            requestAnimationFrame(animate);
            orbit.rotation.y += params.speed; // Tezlik dinamik o'zgaradi
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
