<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Interaktiv Quyosh Sistemasi</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #info { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">
        <h1>Quyosh Sistemasi</h1>
        <p>Interaktiv 3D model</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Sahna va Kamera
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Quyosh
        const sun = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
        scene.add(sun);

        // 3. Yordamchi funksiya: Sayyora yaratish
        function createPlanet(size, color, distance) {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 32, 32), new THREE.MeshStandardMaterial({ color }));
            const orbit = new THREE.Object3D();
            scene.add(orbit);
            orbit.add(mesh);
            mesh.position.x = distance;
            return { mesh, orbit };
        }

        const earth = createPlanet(0.5, 0x2233ff, 7);
        const mars = createPlanet(0.4, 0xff4422, 10);

        // 4. Yorug'lik
        scene.add(new THREE.PointLight(0xffffff, 200, 100));
        scene.add(new THREE.AmbientLight(0x222222));

        camera.position.z = 20;

        // 5. Animatsiya
        function animate() {
            requestAnimationFrame(animate);
            earth.orbit.rotation.y += 0.01;
            mars.orbit.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
