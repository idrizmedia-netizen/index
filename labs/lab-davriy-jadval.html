<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280, initial-scale=0.25, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes"/>
<title>Davriy Jadval — Ziyomap</title>
   <link rel="icon" type="image/png" href="icon-192x192.png">
<script>(function(){var p=new URLSearchParams(location.search).get('theme');var s=p||localStorage.getItem('zy_theme')||'dark';document.documentElement.setAttribute('data-theme',s);if(p){localStorage.setItem('zy_theme',p);localStorage.setItem('theme',p);}})();</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--accent:#3b82f6;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;}
[data-theme="light"]{--bg:#f0f4ff;--bg2:#fff;--bg3:#e8edf8;--accent:#2563eb;--green:#059669;--orange:#d97706;--red:#dc2626;--purple:#7c3aed;--text:#0f172a;--text2:#475569;--text3:#94a3b8;}
[data-theme="light"] body{background:#f0f4ff!important;color:#0f172a!important;}
[data-theme="light"] .top-nav{background:rgba(240,244,255,.95)!important;}
[data-theme="light"] .info-card{background:#fff!important;border-color:rgba(0,0,0,.1)!important;}
[data-theme="light"] .elem-cell{border-color:rgba(0,0,0,.1)!important;}
[data-theme="light"] .legend-item{background:#e8edf8!important;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:auto;}
.top-nav{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:56px;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:100;}
.nav-logo{font-size:1.1rem;font-weight:800;color:var(--accent);text-decoration:none;}
.nav-back{color:var(--text2);font-size:.85rem;text-decoration:none;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}
.theme-btn{padding:6px 12px;border-radius:20px;border:1px solid rgba(128,128,128,.25);background:transparent;color:var(--text2);font-size:.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.main{padding:1rem 1.5rem 2rem;}
.controls{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.search-box{padding:8px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:var(--bg3);color:var(--text);font-size:.85rem;outline:none;width:220px;}
[data-theme="light"] .search-box{background:#e8edf8;color:#0f172a;border-color:rgba(0,0,0,.1);}
.filter-btn{padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:var(--bg3);color:var(--text2);font-size:.75rem;font-weight:600;cursor:pointer;transition:.15s;}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.table-wrap{overflow-x:auto;}
.ptable{display:grid;grid-template-columns:repeat(18,1fr);gap:3px;min-width:900px;}
.elem-cell{border-radius:6px;padding:3px 2px;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.06);text-align:center;min-height:52px;display:flex;flex-direction:column;justify-content:center;position:relative;}
.elem-cell:hover{transform:scale(1.15);z-index:10;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.elem-cell.selected{box-shadow:0 0 0 2px #fff,0 4px 20px rgba(59,130,246,.5)!important;transform:scale(1.12)!important;z-index:20;}
.elem-num{font-size:.5rem;color:rgba(255,255,255,.5);line-height:1;}
.elem-sym{font-size:.9rem;font-weight:800;line-height:1.2;}
.elem-name{font-size:.38rem;opacity:.7;line-height:1;white-space:nowrap;overflow:hidden;}
.elem-mass{font-size:.38rem;opacity:.6;}
.gap{display:block;}
.info-card{position:fixed;right:20px;bottom:20px;width:280px;background:var(--bg2);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1.25rem;z-index:50;box-shadow:0 20px 60px rgba(0,0,0,.5);display:none;}
.info-card.show{display:block;}
.info-sym{font-size:3rem;font-weight:900;line-height:1;}
.info-name{font-size:1.1rem;font-weight:700;margin-bottom:.5rem;}
.info-row{display:flex;justify-content:space-between;font-size:.78rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.info-lbl{color:var(--text2);}
.info-val{font-weight:600;}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem;}
.legend-item{padding:4px 10px;border-radius:8px;font-size:.68rem;font-weight:600;background:var(--bg3);}
</style>
</head>
<body>
<nav class="top-nav">
  <a href="../labs/" class="nav-back">← Laboratoriya</a>
  <span style="font-size:.9rem;font-weight:600;">⚗️ Interaktiv Davriy Jadval</span>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="theme-btn" onclick="toggleLabTheme()"><span id="t-icon">☀️</span><span id="t-lbl">Kun</span></button>
    <a href="../" class="nav-logo">Ziyomap</a>
  </div>
</nav>
<div class="main">
  <div class="controls">
    <input class="search-box" type="text" placeholder="🔍 Element qidirish..." oninput="filterElem(this.value)" id="search">
    <button class="filter-btn active" onclick="setView('cat',this)">Kategoriya</button>
    <button class="filter-btn" onclick="setView('phase',this)">Fazaviy holat</button>
    <button class="filter-btn" onclick="setView('mass',this)">Massa</button>
    <button class="filter-btn" onclick="setView('en',this)">Elektronmanfiylik</button>
    <span id="info-top" style="font-size:.8rem;color:var(--text2);margin-left:auto;"></span>
  </div>
  <div class="table-wrap">
    <div class="ptable" id="ptable"></div>
  </div>
  <div class="legend" id="legend"></div>
</div>
<div class="info-card" id="info-card">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:.8rem;">
    <div class="info-sym" id="ic-sym">H</div>
    <div>
      <div class="info-name" id="ic-name">Vodorod</div>
      <div style="font-size:.72rem;color:var(--text2);" id="ic-cat">Nomet</div>
    </div>
  </div>
  <div class="info-row"><span class="info-lbl">Tartib raqami Z</span><span class="info-val" id="ic-z">1</span></div>
  <div class="info-row"><span class="info-lbl">Atom massasi</span><span class="info-val" id="ic-mass">1.008</span></div>
  <div class="info-row"><span class="info-lbl">Davr / Guruh</span><span class="info-val" id="ic-pg">1 / 1</span></div>
  <div class="info-row"><span class="info-lbl">Elektron konfiguratsiya</span><span class="info-val" id="ic-ec" style="font-size:.7rem;">1s¹</span></div>
  <div class="info-row"><span class="info-lbl">Elektronmanfiylik</span><span class="info-val" id="ic-en">2.20</span></div>
  <div class="info-row"><span class="info-lbl">Qaynash nuqtasi</span><span class="info-val" id="ic-bp">20.28 K</span></div>
  <div class="info-row"><span class="info-lbl">Zichlik</span><span class="info-val" id="ic-den">0.0899 g/L</span></div>
  <div class="info-row"><span class="info-lbl">Holat (25°C)</span><span class="info-val" id="ic-phase">Gaz</span></div>
  <button onclick="document.getElementById('info-card').classList.remove('show')" style="margin-top:.8rem;width:100%;padding:6px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:.75rem;">✕ Yopish</button>
</div>
<script>

const ELEMS=[

  {z:6,sym:'C',name:'Uglerod',mass:12.011,cat:'Nomet',per:2,grp:14,ec:'[He]2s²2p²',en:2.55,bp:4300,den:2267,phase:'Qattiq'},
  {z:7,sym:'N',name:'Azot',mass:14.007,cat:'Nomet',per:2,grp:15,ec:'[He]2s²2p³',en:3.04,bp:77.36,den:1.251,phase:'Gaz'},
  {z:8,sym:'O',name:'Kislorod',mass:15.999,cat:'Nomet',per:2,grp:16,ec:'[He]2s²2p⁴',en:3.44,bp:90.2,den:1.429,phase:'Gaz'},
  {z:9,sym:'F',name:'Ftor',mass:18.998,cat:'Halogen',per:2,grp:17,ec:'[He]2s²2p⁵',en:3.98,bp:85.03,den:1.696,phase:'Gaz'},
  {z:10,sym:'Ne',name:'Neon',mass:20.18,cat:'Nobel gaz',per:2,grp:18,ec:'[He]2s²2p⁶',en:null,bp:27.07,den:0.9,phase:'Gaz'},
  {z:11,sym:'Na',name:'Natriy',mass:22.99,cat:'Ishqoriy metall',per:3,grp:1,ec:'[Ne]3s¹',en:0.93,bp:1156,den:971,phase:'Qattiq'},
  {z:12,sym:'Mg',name:'Magniy',mass:24.305,cat:'Ishqoriy-yer metall',per:3,grp:2,ec:'[Ne]3s²',en:1.31,bp:1363,den:1738,phase:'Qattiq'},
  {z:13,sym:'Al',name:'Alyuminiy',mass:26.982,cat:'Metall (p-blok)',per:3,grp:13,ec:'[Ne]3s²3p¹',en:1.61,bp:2792,den:2700,phase:'Qattiq'},
  {z:14,sym:'Si',name:'Kremniy',mass:28.085,cat:'Yarimetall',per:3,grp:14,ec:'[Ne]3s²3p²',en:1.9,bp:3538,den:2330,phase:'Qattiq'},
  {z:15,sym:'P',name:'Fosfor',mass:30.974,cat:'Nomet',per:3,grp:15,ec:'[Ne]3s²3p³',en:2.19,bp:553.65,den:1823,phase:'Qattiq'},
  {z:16,sym:'S',name:'Oltingugurt',mass:32.06,cat:'Nomet',per:3,grp:16,ec:'[Ne]3s²3p⁴',en:2.58,bp:717.87,den:2067,phase:'Qattiq'},
  {z:17,sym:'Cl',name:'Xlor',mass:35.45,cat:'Halogen',per:3,grp:17,ec:'[Ne]3s²3p⁵',en:3.16,bp:239.11,den:3.214,phase:'Gaz'},
  {z:18,sym:'Ar',name:'Argon',mass:39.948,cat:'Nobel gaz',per:3,grp:18,ec:'[Ne]3s²3p⁶',en:null,bp:87.3,den:1.784,phase:'Gaz'},
  {z:19,sym:'K',name:'Kaliy',mass:39.098,cat:'Ishqoriy metall',per:4,grp:1,ec:'[Ar]4s¹',en:0.82,bp:1032,den:862,phase:'Qattiq'},
  {z:20,sym:'Ca',name:'Kalsiy',mass:40.078,cat:'Ishqoriy-yer metall',per:4,grp:2,ec:'[Ar]4s²',en:1.0,bp:1757,den:1540,phase:'Qattiq'},
  {z:21,sym:'Sc',name:'Skandiy',mass:44.956,cat:"O'tish metall",per:4,grp:3,ec:'[Ar]3d¹4s²',en:1.36,bp:3109,den:2985,phase:'Qattiq'},
  {z:22,sym:'Ti',name:'Titan',mass:47.867,cat:"O'tish metall",per:4,grp:4,ec:'[Ar]3d²4s²',en:1.54,bp:3560,den:4507,phase:'Qattiq'},
  {z:23,sym:'V',name:'Vanadiy',mass:50.942,cat:"O'tish metall",per:4,grp:5,ec:'[Ar]3d³4s²',en:1.63,bp:3680,den:6110,phase:'Qattiq'},
  {z:24,sym:'Cr',name:'Xrom',mass:51.996,cat:"O'tish metall",per:4,grp:6,ec:'[Ar]3d⁵4s¹',en:1.66,bp:2944,den:7150,phase:'Qattiq'},
  {z:25,sym:'Mn',name:'Marganets',mass:54.938,cat:"O'tish metall",per:4,grp:7,ec:'[Ar]3d⁵4s²',en:1.55,bp:2334,den:7470,phase:'Qattiq'},
  {z:26,sym:'Fe',name:'Temir',mass:55.845,cat:"O'tish metall",per:4,grp:8,ec:'[Ar]3d⁶4s²',en:1.83,bp:3134,den:7874,phase:'Qattiq'},
  {z:27,sym:'Co',name:'Kobalt',mass:58.933,cat:"O'tish metall",per:4,grp:9,ec:'[Ar]3d⁷4s²',en:1.88,bp:3200,den:8900,phase:'Qattiq'},
  {z:28,sym:'Ni',name:'Nikel',mass:58.693,cat:"O'tish metall",per:4,grp:10,ec:'[Ar]3d⁸4s²',en:1.91,bp:3186,den:8908,phase:'Qattiq'},
  {z:29,sym:'Cu',name:'Mis',mass:63.546,cat:"O'tish metall",per:4,grp:11,ec:'[Ar]3d¹⁰4s¹',en:1.9,bp:2835,den:8960,phase:'Qattiq'},
  {z:30,sym:'Zn',name:'Rux',mass:65.38,cat:"O'tish metall",per:4,grp:12,ec:'[Ar]3d¹⁰4s²',en:1.65,bp:1180,den:7133,phase:'Qattiq'},
  {z:31,sym:'Ga',name:'Galliy',mass:69.723,cat:'Metall (p-blok)',per:4,grp:13,ec:'[Ar]3d¹⁰4s²4p¹',en:1.81,bp:2477,den:5907,phase:'Qattiq'},
  {z:32,sym:'Ge',name:'Germaniy',mass:72.63,cat:'Yarimetall',per:4,grp:14,ec:'[Ar]3d¹⁰4s²4p²',en:2.01,bp:3106,den:5323,phase:'Qattiq'},
  {z:33,sym:'As',name:'Mishyak',mass:74.922,cat:'Yarimetall',per:4,grp:15,ec:'[Ar]3d¹⁰4s²4p³',en:2.18,bp:887,den:5727,phase:'Qattiq'},
  {z:34,sym:'Se',name:'Selen',mass:78.971,cat:'Nomet',per:4,grp:16,ec:'[Ar]3d¹⁰4s²4p⁴',en:2.55,bp:958.05,den:4819,phase:'Qattiq'},
  {z:35,sym:'Br',name:'Brom',mass:79.904,cat:'Halogen',per:4,grp:17,ec:'[Ar]3d¹⁰4s²4p⁵',en:2.96,bp:332.0,den:3102,phase:'Suyuq'},
  {z:36,sym:'Kr',name:'Kripton',mass:83.798,cat:'Nobel gaz',per:4,grp:18,ec:'[Ar]3d¹⁰4s²4p⁶',en:3.0,bp:119.93,den:3.749,phase:'Gaz'},
  {z:37,sym:'Rb',name:'Rubidiy',mass:85.468,cat:'Ishqoriy metall',per:5,grp:1,ec:'[Kr]5s¹',en:0.82,bp:961,den:1532,phase:'Qattiq'},
  {z:38,sym:'Sr',name:'Stronsiy',mass:87.62,cat:'Ishqoriy-yer metall',per:5,grp:2,ec:'[Kr]5s²',en:0.95,bp:1655,den:2630,phase:'Qattiq'},
  {z:47,sym:'Ag',name:'Kumush',mass:107.87,cat:"O'tish metall",per:5,grp:11,ec:'[Kr]4d¹⁰5s¹',en:1.93,bp:2435,den:10490,phase:'Qattiq'},
  {z:79,sym:'Au',name:'Oltin',mass:196.97,cat:"O'tish metall",per:6,grp:11,ec:'[Xe]4f¹⁴5d¹⁰6s¹',en:2.54,bp:3129,den:19302,phase:'Qattiq'},
  {z:80,sym:'Hg',name:'Simob',mass:200.59,cat:"O'tish metall",per:6,grp:12,ec:'[Xe]4f¹⁴5d¹⁰6s²',en:2.0,bp:629.88,den:13534,phase:'Suyuq'},
];

let view='cat',selZ=null,searchTerm='';

function getColor(el){
  if(view==='cat') return CATS[el.cat]||'#6b7280';
  if(view==='phase'){
    return el.phase==='Gaz'?'#3b82f6':el.phase==='Suyuq'?'#10b981':'#ef4444';
  }
  if(view==='mass'){
    const t=Math.min(1,el.mass/240);
    return `rgb(${Math.floor(59+196*t)},${Math.floor(130-90*t)},${Math.floor(246-200*t)})`;
  }
  if(view==='en'){
    if(!el.en)return '#4b5563';
    const t=(el.en-0.7)/(4.0-0.7);
    return `rgb(${Math.floor(59+196*t)},${Math.floor(130-90*t)},${Math.floor(246-200*t)})`;
  }
}

function buildTable(){
  const tbl=document.getElementById('ptable');
  tbl.innerHTML='';
  const grid=Array(9).fill(null).map(()=>Array(18).fill(null));
  ELEMS.forEach(el=>{
    if(el.per<=7&&el.grp>=1){
      const row=el.per-1,col=el.grp-1;
      if(row>=0&&row<9&&col>=0&&col<18) grid[row][col]=el;
    }
  });
  for(let r=0;r<7;r++){
    for(let c=0;c<18;c++){
      const el=grid[r][c];
      if(!el){const g=document.createElement('div');g.className='gap';tbl.appendChild(g);continue;}
      const term=searchTerm.toLowerCase();
      const matches=!term||(el.sym.toLowerCase().includes(term)||el.name.toLowerCase().includes(term)||String(el.z).includes(term));
      const div=document.createElement('div');div.className='elem-cell'+(selZ===el.z?' selected':'');
      const col=getColor(el);
      div.style.background=`${col}22`;div.style.borderColor=`${col}44`;
      if(!matches) div.style.opacity='0.1';
      if(selZ===el.z) div.style.background=`${col}55`;
      div.innerHTML=`<div class="elem-num">${el.z}</div><div class="elem-sym" style="color:${col}">${el.sym}</div><div class="elem-name">${el.name}</div><div class="elem-mass">${el.mass}</div>`;
      div.onclick=()=>showInfo(el);
      tbl.appendChild(div);
    }
  }
  buildLegend();
}

function showInfo(el){
  selZ=el.z;
  const col=getColor(el);
  document.getElementById('ic-sym').textContent=el.sym;document.getElementById('ic-sym').style.color=col;
  document.getElementById('ic-name').textContent=el.name;
  document.getElementById('ic-cat').textContent=el.cat;
  document.getElementById('ic-z').textContent=el.z;
  document.getElementById('ic-mass').textContent=el.mass+' a.u.';
  document.getElementById('ic-pg').textContent=`${el.per} / ${el.grp}`;
  document.getElementById('ic-ec').textContent=el.ec;
  document.getElementById('ic-en').textContent=el.en||'—';
  document.getElementById('ic-bp').textContent=el.bp+' K';
  document.getElementById('ic-den').textContent=el.den+' kg/m³';
  document.getElementById('ic-phase').textContent=el.phase;
  document.getElementById('info-card').classList.add('show');
  document.getElementById('info-top').textContent=`Tanlangan: ${el.name} (${el.sym})`;
  buildTable();
}

function buildLegend(){
  const leg=document.getElementById('legend');
  leg.innerHTML='';
  if(view==='cat'){
    Object.entries(CATS).forEach(([name,col])=>{
      const d=document.createElement('div');d.className='legend-item';
      d.innerHTML=`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${col};margin-right:5px;vertical-align:middle;"></span>${name}`;
      leg.appendChild(d);
    });
  } else if(view==='phase'){
    [['Qattiq','#ef4444'],['Suyuq','#10b981'],['Gaz','#3b82f6']].forEach(([n,c])=>{
      const d=document.createElement('div');d.className='legend-item';
      d.innerHTML=`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};margin-right:5px;vertical-align:middle;"></span>${n}`;
      leg.appendChild(d);
    });
  } else {
    const d=document.createElement('div');d.className='legend-item';
    d.style.background='linear-gradient(90deg,#3b82f6,#ef4444)';d.style.color='#fff';
    d.style.padding='4px 20px';d.textContent=view==='mass'?'Kichik massa → Katta massa':'Past EN → Yuqori EN';
    leg.appendChild(d);
  }
}

function setView(v,btn){view=v;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildTable();}
function filterElem(q){searchTerm=q;buildTable();}
function toggleLabTheme(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('zy_theme',n);localStorage.setItem('theme',n);var i=document.getElementById('t-icon'),l=document.getElementById('t-lbl');if(i)i.textContent=n==='dark'?'☀️':'🌙';if(l)l.textContent=n==='dark'?'Kun':'Tun';}
(function(){var t=document.documentElement.getAttribute('data-theme')||'dark';var i=document.getElementById('t-icon');var l=document.getElementById('t-lbl');if(i)i.textContent=t==='dark'?'☀️':'🌙';if(l)l.textContent=t==='dark'?'Kun':'Tun';})();
buildTable();
</script>
</body>
</html>
