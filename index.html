<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyomap | Fizika va Texnologiya</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #3b82f6;
            --dark-color: #1e293b;
            --light-bg: #f0f9ff;
            --text-color: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.9);
            --gradient-bg: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
        }
        body.dark-theme {
            --primary-color: #38bdf8;
            --secondary-color: #1d4ed8;
            --dark-color: #f1f5f9;
            --light-bg: #020617;
            --text-color: #f1f5f9;
            --card-bg: rgba(30, 41, 59, 0.7);
            --gradient-bg: linear-gradient(135deg, #020617 0%, #0f172a 100%);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            background: var(--gradient-bg); 
            background-attachment: fixed; 
            color: var(--text-color); 
            scroll-behavior: smooth; 
            overflow-x: hidden; 
        }
        /* Navbar, Card va boshqa dizaynlar */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        nav { padding: 20px 0; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo-brand { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); text-decoration: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .btn { background: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        
        /* Chat Oynasi Stili */
        #chat-window { position: fixed; bottom: 90px; right: 20px; width: 380px; height: 500px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 9999; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .chat-input-area { padding: 15px; border-top: 1px solid rgba(0,0,0,0.1); display: flex; gap: 10px; align-items: center; }
        #user-input-ai { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>

    <div id="preloader" style="position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:10000; display:flex; justify-content:center; align-items:center; transition: 0.5s;">
        <h1 style="color: var(--primary-color);">Ziyomap</h1>
    </div>

    <nav>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <a href="#" class="logo-brand">Ziyomap</a>
            <div id="nav-links">
                <a href="#home" style="margin-left:20px; text-decoration:none; color:var(--text-color);">Asosiy</a>
                <a href="#projects" style="margin-left:20px; text-decoration:none; color:var(--text-color);">Loyihalar</a>
                <a href="#lab" style="margin-left:20px; text-decoration:none; color:var(--text-color);">Laboratoriya</a>
                <a href="#blog" style="margin-left:20px; text-decoration:none; color:var(--text-color);">Blog</a>
                <i class="fas fa-moon" id="theme-toggle" style="margin-left:20px; cursor:pointer;"></i>
            </div>
            <button class="menu-toggle" id="mobile-menu-btn" style="display:none;"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <section id="lab" class="container" style="padding: 100px 0;">
        <h2 data-aos="fade-up">Fizika Laboratoriyasi</h2>
        <div class="grid">
            <div class="card" data-aos="fade-up">
                <h3>Om qonuni</h3>
                <input type="number" id="voltage" placeholder="Kuchlanish (V)" style="width:100%; margin-bottom:10px; padding:8px;">
                <input type="number" id="resistance" placeholder="Qarshilik (Ω)" style="width:100%; margin-bottom:10px; padding:8px;">
                <button onclick="calculateCurrent()" class="btn">Hisoblash</button>
                <p id="calcResult" style="margin-top:15px; font-weight:bold; color:var(--primary-color);"></p>
            </div>
            <div class="card" data-aos="fade-up">
                <h3>Natijalar tarixi</h3>
                <div id="results-list" style="max-height: 150px; overflow-y: auto;">
                    <p style="color: #94a3b8; font-style: italic;">Hali natijalar yo'q</p>
                </div>
                <button onclick="clearResults()" class="btn" style="background:#64748b; margin-top:10px;">Tozalash</button>
            </div>
        </div>
    </section>

    <div id="chat-window">
        <div style="padding:15px; background:var(--primary-color); color:white; border-radius:20px 20px 0 0; display:flex; justify-content:space-between;">
            <span>Ziyomap AI</span>
            <i class="fas fa-times" id="close-chat" style="cursor:pointer;"></i>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="user-input-ai" placeholder="Savolingizni yozing...">
            <button id="send-btn-ai" class="btn" style="padding:10px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <button id="chat-toggle" style="position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:50%; background:var(--primary-color); color:white; border:none; cursor:pointer; z-index:10000; font-size:1.5rem; box-shadow:0 10px 20px rgba(0,0,0,0.2);">
        <i class="fas fa-robot"></i>
    </button>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        const firebaseConfig = { apiKey: "AIzaSyA2LiNy7o7l6kn1FTvOcXqBs14M3PVsjbI", authDomain: "ziyomap.firebaseapp.com", projectId: "ziyomap", storageBucket: "ziyomap.firebasestorage.app", messagingSenderId: "982123868162", appId: "1:982123868162:web:6845723988c030fcd1f71b" };
        const app = initializeApp(firebaseConfig);
    </script>

    <script>
        // 1. Preloader va AOS
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                setTimeout(() => { preloader.style.opacity = '0'; setTimeout(() => preloader.style.display = 'none', 500); }, 1500);
            }
            AOS.init({ duration: 1000, once: true });
        });

        // 2. Tun/Kun rejimi
        const themeToggle = document.getElementById('theme-toggle');
        if(themeToggle) {
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                const isDark = document.body.classList.contains('dark-theme');
                themeToggle.classList.toggle('fa-sun', isDark);
                themeToggle.classList.toggle('fa-moon', !isDark);
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        }

        // 3. Laboratoriya funksiyalari
        window.calculateCurrent = function() {
            const v = document.getElementById('voltage').value;
            const r = document.getElementById('resistance').value;
            const resDisplay = document.getElementById('calcResult');
            if(v && r && r > 0) {
                const i = (v / r).toFixed(2);
                resDisplay.innerText = `Tok kuchi: I = ${i} Amper`;
                const list = document.getElementById('results-list');
                if(list.innerHTML.includes('Hali natijalar yo\'q')) list.innerHTML = '';
                list.innerHTML += `<div style="background:var(--light-bg); padding:8px; border-radius:8px; margin-bottom:5px; font-size:0.9rem;">V=${v}V, R=${r}Ω => I=${i}A</div>`;
            }
        };

        window.clearResults = function() {
            const list = document.getElementById('results-list');
            if(list) list.innerHTML = '<p style="color: #94a3b8; font-style: italic;">Tozalandi. Yangi tajriba boshlang.</p>';
        };

        // 4. Chat oynasini boshqarish
        const chatToggle = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const closeChat = document.getElementById('close-chat');
        if(chatToggle) chatToggle.addEventListener('click', () => chatWindow.style.display = 'flex');
        if(closeChat) closeChat.addEventListener('click', () => chatWindow.style.display = 'none');
    </script>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/api-chat.js"></script>
    
    <script src="labs/mexanika.js"></script>
    <script src="labs/optika.js"></script>
    <script src="labs/elektr.js"></script>
    <script src="labs/astronomiya.js"></script>
    <script src="labs/termodinamika.js"></script>
    <script src="labs/yadro-fizikasi.js"></script>
    <script src="labs/tolqinlar.js"></script>
    <script src="labs/amaliy-fizika.js"></script>
    <script src="labs/paradokslar.js"></script>
</body>
</html>
